<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新闻 - BF Tracker</title>
  <link rel="stylesheet" href="css/input.css">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    .tab-active { color: #fff; border-bottom-color: rgba(255,255,255,0.3) !important; }
    .news-card { cursor: pointer; transition: all .2s; }
    .news-card:hover { border-color: rgba(255,255,255,0.15); }
    .page-btn { padding: 6px 12px; border: 1px solid var(--border-default); font-size: .8rem; color: var(--text-muted); background: transparent; cursor: pointer; }
    .page-btn:hover { border-color: var(--border-strong); color: #fff; }
    .page-btn.active { background: var(--border-strong); color: #fff; border-color: var(--border-strong); }
    .page-btn:disabled { opacity: .3; cursor: not-allowed; }
    .type-badge { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: .7rem; font-weight: 600; }
    .type-游戏更新 { background: rgba(96,165,250,0.15); color: #60a5fa; }
    .type-指南 { background: rgba(74,222,128,0.15); color: #4ade80; }
    .type-新闻文章 { background: rgba(244,114,182,0.15); color: #f472b6; }
    .article-body { font-size: .875rem; line-height: 1.8; color: var(--text-muted); word-break: break-word; }
    .article-body h1, .article-body h2 { font-size: 1.1rem; font-weight: 700; color: #fff; margin: 1.5rem 0 .5rem; }
    .article-body h3 { font-size: 1rem; font-weight: 600; margin: 1.2rem 0 .4rem; }
    .article-body p { margin-bottom: .75rem; }
    .article-body ul, .article-body ol { padding-left: 1.5rem; margin-bottom: .75rem; }
    .article-body li { margin-bottom: .3rem; }
    .article-body strong { color: #fff; }
    .article-body a { color: #60a5fa; text-decoration: underline; }
    .article-body img { max-width: 100%; border-radius: 0; margin: 1rem 0; }
    .article-body hr { border: none; border-top: 1px solid var(--border-default); margin: 1.5rem 0; }
    .article-body blockquote { border-left: 3px solid var(--color-accent); padding-left: 1rem; color: var(--text-dim); margin: 1rem 0; }
  </style>
</head>
<body class="bg-dark text-gray-200 min-h-screen flex flex-col">
  <script>(function(){if(localStorage.theme==='light')document.body.classList.add('light')})()</script>

  <nav class="border-b border-gray-700 bg-card relative">
    <div class="max-w-5xl mx-auto px-4 h-14 flex items-center justify-between">
      <a href="index.html" class="text-xl font-bold gradient-text">BF Tracker</a>
      <div class="flex gap-6 text-sm text-gray-400">
        <a href="index.html" aria-label="首页" class="nav-link hover:text-white pb-1">首页</a>
        <a href="news.html" aria-label="新闻" class="nav-link active pb-1">新闻</a>
        <a href="compare.html" aria-label="多人对比" class="nav-link hover:text-white pb-1">多人对比</a>
      </div>
    </div>
  </nav>

  <div class="flex-1 w-full">
    <div class="max-w-5xl mx-auto px-3 sm:px-4 py-6">
      <h1 class="text-2xl font-bold mb-6">《战地风云 6》新闻</h1>

      <div class="flex gap-1 sm:gap-3 mb-6 overflow-x-auto pb-2 text-sm">
        <button class="tab-btn active px-3 py-1.5 whitespace-nowrap" data-type="">最新</button>
        <button class="tab-btn px-3 py-1.5 whitespace-nowrap" data-type="游戏更新">游戏更新</button>
        <button class="tab-btn px-3 py-1.5 whitespace-nowrap" data-type="指南">指南</button>
        <button class="tab-btn px-3 py-1.5 whitespace-nowrap" data-type="新闻文章">新闻</button>
      </div>

      <div id="loadingWrap"><div class="spinner" style="margin:3rem auto"></div></div>
      <div id="errorWrap" class="hidden text-center py-12">
        <p class="text-3xl mb-3">😵</p>
        <p class="text-gray-500">加载新闻失败，请稍后重试</p>
      </div>
      <div id="newsGrid" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
      <div id="pagination" class="hidden flex items-center justify-center gap-2 mt-8"></div>
    </div>
  </div>

  <script>
    const BASE = '/BFTracker/news';
    const PER_PAGE = 12;
    let allArticles = [];
    let filteredArticles = [];
    let currentType = '';
    let currentPage = 1;
    let totalPages = 1;

    const fmtDate = s => {
      const d = new Date(s);
      return `${d.getFullYear()}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getDate().toString().padStart(2,'0')}`;
    };

    async function loadAll() {
      const wrap = document.getElementById('loadingWrap');
      const grid = document.getElementById('newsGrid');
      const err = document.getElementById('errorWrap');
      wrap.classList.remove('hidden');
      grid.classList.add('hidden');
      err.classList.add('hidden');

      try {
        const idxRes = await fetch(`${BASE}/index.json`);
        if (!idxRes.ok) throw new Error('News data not available');
        const idx = await idxRes.json();
        totalPages = idx.totalPages || 1;

        const pages = [];
        for (let p = 1; p <= totalPages; p++) {
          pages.push(fetch(`${BASE}/page-${p}.json`).then(r => r.json()));
        }
        const results = await Promise.all(pages);

        const seen = new Set();
        allArticles = [];
        results.forEach(r => {
          (r.articles || []).forEach(a => {
            if (!seen.has(a.slug)) { seen.add(a.slug); allArticles.push(a); }
          });
        });
        if (!allArticles.length) throw new Error('No articles');
        applyFilter();
      } catch (e) {
        console.error(e);
        wrap.classList.add('hidden');
        err.classList.remove('hidden');
      }
    }

    function applyFilter() {
      const active = document.querySelector('.tab-btn.active');
      currentType = active ? (active.dataset.type || '') : '';
      filteredArticles = currentType
        ? allArticles.filter(a => a.type === currentType)
        : [...allArticles];
      currentPage = 1;
      renderPage();
    }

    function renderPage() {
      const wrap = document.getElementById('loadingWrap');
      const grid = document.getElementById('newsGrid');
      const pag = document.getElementById('pagination');
      wrap.classList.add('hidden');
      grid.classList.remove('hidden');

      const total = filteredArticles.length;
      const pages = Math.ceil(total / PER_PAGE);
      const start = (currentPage - 1) * PER_PAGE;
      const pageItems = filteredArticles.slice(start, start + PER_PAGE);

      grid.innerHTML = pageItems.map(a => {
        const typeClass = `type-${a.type}`;
        return `<div class="bg-card border border-gray-800 rounded-xl overflow-hidden news-card fade-up" onclick="openDetail('${a.slug}')">
          ${a.img ? `<img src="${a.img}" alt="" class="w-full h-40 object-cover" loading="lazy" onerror="this.style.display='none'" referrerpolicy="no-referrer">` : `<div class="w-full h-40 bg-card flex items-center justify-center text-4xl" style="color:var(--text-dim)">🎮</div>`}
          <div class="p-4">
            <div class="flex items-center gap-2 mb-2">
              <span class="type-badge ${typeClass}">${a.type}</span>
              ${a.featured ? '<span class="text-xs" style="color:#f59e0b;font-weight:600">⭐ 精选</span>' : ''}
              <span class="text-xs" style="color:var(--text-dim)">${fmtDate(a.date)}</span>
            </div>
            <h3 class="font-semibold text-sm leading-snug mb-1 line-clamp-2">${a.title}</h3>
            <p class="text-xs" style="color:var(--text-dim);line-clamp:2;-webkit-line-clamp:2;overflow:hidden;display:-webkit-box;-webkit-box-orient:vertical">${a.summary || ''}</p>
          </div>
        </div>`;
      }).join('');

      if (pages <= 1) { pag.classList.add('hidden'); return; }
      pag.classList.remove('hidden');
      let h = `<button class="page-btn" onclick="goPage(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}>‹ 上一页</button>`;
      for (let i = 1; i <= pages; i++) {
        if (i === 1 || i === pages || Math.abs(i - currentPage) <= 2) {
          h += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
        } else if (!h.endsWith('…')) {
          h += `<span style="color:var(--text-dim);font-size:.75rem;padding:0 2px">…</span>`;
        }
      }
      h += `<button class="page-btn" onclick="goPage(${currentPage + 1})" ${currentPage >= pages ? 'disabled' : ''}>下一页 ›</button>`;
      pag.innerHTML = h;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function goPage(p) { currentPage = p; renderPage(); }

    function openDetail(slug) {
      window.location.href = `news-detail.html?slug=${encodeURIComponent(slug)}`;
    }

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active', 'active'));
        btn.classList.add('tab-active', 'active');
        applyFilter();
      });
    });

    loadAll();
  </script>
</body>
</html>
