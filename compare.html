<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>多人对比 - BF Tracker</title>
  <link rel="stylesheet" href="css/input.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-dark text-gray-200 min-h-screen flex flex-col">
  <script>(function(){if(localStorage.theme==='light')document.body.classList.add('light')})()</script>

  <!-- 导航 -->
  <nav class="border-b border-gray-700 bg-card relative sticky top-0 z-10">
    <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between">
      <a href="index.html" class="text-xl font-bold gradient-text">BF Tracker</a>
      <div class="flex gap-6 text-sm text-gray-400">
        <a href="index.html" aria-label="首页" class="nav-link hover:text-white pb-1">首页</a>
        <a href="news.html" aria-label="新闻" class="nav-link hover:text-white pb-1">新闻</a>
        <a href="compare.html" aria-label="多人对比" class="nav-link active pb-1">多人对比</a>
      </div>
    </div>
  </nav>

<div class="flex-1">
  <div class="max-w-6xl mx-auto px-3 sm:px-4 py-4 sm:py-8">

    <!-- Hero -->
    <div class="max-w-5xl mx-auto px-4 pt-4 sm:pt-8 pb-4 sm:pb-6 text-center">
      <h1 class="text-2xl sm:text-3xl font-bold mb-2">
        <span class="gradient-text">多玩家对比</span>
      </h1>
      <p class="text-gray-400 mb-8">同时对比最多 4 名玩家 · 六维雷达图 + 详细数据表</p>

      <!-- 搜索卡片 -->
      <div class="bg-card  p-4 sm:p-6 shadow-xl max-w-2xl mx-auto">
        <div class="flex flex-wrap gap-3 mb-4">
          <select id="gameSelect" aria-label="选择游戏"
            class="bg-dark border border-gray-600  px-3 py-2.5 text-sm focus:outline-none focus:border-accent flex-1 sm:flex-none">
          </select>
          
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-4" id="playerSlots"></div>
        <div class="flex justify-center mb-3"><button id="addSlotBtn" class="border border-gray-600 text-gray-400 hover:text-white hover:border-gray-500 px-4 py-2  text-xs transition-colors">+ 添加对比</button></div>
        <button id="compareBtn" aria-label="开始对比"
          class="bg-white text-black px-8 py-3 text-sm hover:opacity-85 transition-opacity w-full sm:w-auto">
          开始对比
        </button>
      </div>
    </div>

    <!-- 最近对比 -->
    <div class="max-w-5xl mx-auto px-4 pb-8" id="recentCompareSection" style="display:none">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-xs sm:text-sm font-semibold text-gray-500 uppercase tracking-wider">最近对比</h2>
        <button id="clearCompareBtn" class="text-xs text-gray-500 hover:text-red-400 transition-colors">清除全部</button>
      </div>
      <div id="recentCompareList" class="flex flex-wrap gap-2"></div>
    </div>

    <!-- 加载中：骨架屏 -->
    <div id="loadingState" class="hidden px-4 py-8">
      <div class="animate-pulse space-y-4 max-w-5xl mx-auto">
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
          <div class="bg-card  p-5 h-32"><div class="h-full bg-white/10"></div></div>
          <div class="bg-card  p-5 h-32"><div class="h-full bg-white/10"></div></div>
          <div class="bg-card  p-5 h-32"><div class="h-full bg-white/10"></div></div>
          <div class="bg-card  p-5 h-32"><div class="h-full bg-white/10"></div></div>
        </div>
        <div class="bg-card  p-5 h-96"><div class="h-full bg-white/10"></div></div>
      </div>
      <p class="text-gray-500 text-sm text-center mt-4">正在查询数据...</p>
    </div>

    <!-- 结果区 -->
    <div id="results" class="hidden">
      <!-- 雷达图 -->
      <div class="bg-card  p-3 sm:p-5 mb-4 sm:mb-6">
        <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-4">六维能力雷达图</h2>
        <div id="radarChart" style="width:100%;max-width:600px;height:380px;margin:0 auto"></div>
      </div>

      <!-- 对比表格 -->
      <div class="bg-card  p-3 sm:p-5 overflow-x-auto table-responsive">
        <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-4">数据对比</h2>
        <table class="w-full text-sm" id="compareTable">
          <thead></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <script type="module">
    import * as echarts from 'echarts/core';
    import { PieChart, BarChart, LineChart, RadarChart } from 'echarts/charts';
    import { LegendComponent, TooltipComponent, GridComponent } from 'echarts/components';
    import { CanvasRenderer } from 'echarts/renderers';
    echarts.use([PieChart, BarChart, LineChart, RadarChart, LegendComponent, TooltipComponent, GridComponent, CanvasRenderer]);
    import { getStats, GAME_LABELS, PLATFORM_LABELS, PLATFORM_KEYS } from './js/api.js';
    import { saveSnapshot, saveRecentSearch, saveRecentCompare, getRecentCompares, removeRecentCompare, clearRecentCompares } from './js/storage.js';
    import { formatNum, formatPct, formatDecimal, formatSeconds, kdColor, winColor, buildPlayerUrl } from './js/utils.js';

    let MAX = 2;
    const COLORS = ['#3b82f6', '#8b5cf6', '#22c55e', '#f59e0b'];

    // 填充游戏下拉
    const gameSelect = document.getElementById('gameSelect');
    Object.entries(GAME_LABELS).forEach(([val, label]) => {
      gameSelect.innerHTML += `<option value="${val}">${label}</option>`;
    });

    // 从 URL 预填第一个玩家
    const urlParams = new URLSearchParams(window.location.search);
    const preGame     = urlParams.get('p1game')     || 'bf6';
    const prePlatform = urlParams.get('p1platform') || 'xbox';
    const preName     = urlParams.get('p1name')     || '';
    gameSelect.value = preGame;

    // 平台分类 → 该分类下第一个有效子平台
    

    // 渲染玩家输入槽（平台分类选择）
    function renderSlots() {
      // 保存已有输入值
      const saved = [];
      for (let i = 0; i < 4; i++) {
        const n = document.querySelector('[data-slot="' + i + '"][data-field="name"]');
        const p = document.querySelector('[data-slot="' + i + '"][data-field="platform"]');
        saved.push({ name: n ? n.value : '', platform: p ? p.value : '' });
      }
      const slotsEl = document.getElementById('playerSlots');
      slotsEl.innerHTML = '';
      for (let i = 0; i < MAX; i++) {
        const preName = saved[i] ? saved[i].name : (i === 0 ? urlParams.get('p1name') || '' : '');
        const preCat = saved[i] ? saved[i].platform : (i === 0 ? (urlParams.get('p1platform') || 'xbox') : 'xbox');
        const div = document.createElement('div');
        div.className = 'bg-dark p-3 border border-gray-700 hover-lift';
        div.innerHTML = '<div class="flex items-center gap-2 mb-2">' +
          '<span class="w-5 h-5 rounded-full flex items-center justify-center text-xs font-bold text-white shrink-0" style="background:' + COLORS[i] + '">' + (i+1) + '</span>' +
          '<span class="text-xs text-gray-400">' + (i > 1 ? '可选' : '必填') + '</span>' +
          (i > 1 ? '<button data-del="' + i + '" class="ml-auto text-gray-600 hover:text-red-400 text-lg leading-none">&times;</button>' : '') +
          '</div>' +
          '<input type="text" placeholder="用户名" value="' + preName + '" data-slot="' + i + '" data-field="name" class="search-input w-full bg-card border border-gray-600  px-3 py-2 text-xs mb-2 focus:outline-none focus:border-accent" />' +
          '<select data-slot="' + i + '" data-field="platform" class="w-full bg-card border border-gray-600  px-3 py-2 text-xs focus:outline-none focus:border-accent">' +
          PLATFORM_KEYS.map(function(key) { return '<option value="' + key + '"' + (key === preCat ? ' selected' : '') + '>' + (PLATFORM_LABELS[key] || key) + '</option>'; }).join('') +
          '</select>';
        slotsEl.appendChild(div);
      }
      // X 删除按钮
      document.querySelectorAll('[data-del]').forEach(function(b) {
        b.onclick = function() {
          MAX--; renderSlots();
        };
      });
      checkAddBtn();
    }
    renderSlots();
    gameSelect.addEventListener('change', renderSlots);
    // 添加对比按钮
    document.getElementById('addSlotBtn').addEventListener('click', () => {
      if (MAX < 4) { MAX++; renderSlots(); if (MAX >= 4) document.getElementById('addSlotBtn').style.display = 'none'; }
    });
    // 检查是否需要显示添加按钮
    function checkAddBtn() {
      const btn = document.getElementById('addSlotBtn');
      if (btn) btn.style.display = MAX < 4 ? 'inline-block' : 'none';
    }
    
    function getSlotValues() {
      const game = gameSelect.value;
      const result = [];
      for (let i = 0; i < MAX; i++) {
        const name = document.querySelector(`[data-slot="${i}"][data-field="name"]`)?.value.trim();
        const platformKey = document.querySelector(`[data-slot="${i}"][data-field="platform"]`)?.value;
        if (name && platformKey) {
          result.push({ game, platform: platformKey, name });
        }
      }
      return result;
    }

    // 雷达图
    function renderRadar(players, statsArr) {
      const chart = echarts.init(document.getElementById('radarChart'), 'dark');

      // 指标最大值取所有玩家最大
      const maxKd  = Math.max(...statsArr.map(s => s.killDeath || 0), 1) * 1.2;
      const maxKpm = Math.max(...statsArr.map(s => s.killsPerMinute || 0), 1) * 1.2;
      const maxAcc = 100;
      const maxWin = 100;
      const maxRev = Math.max(...statsArr.map(s => s.revives || 0), 1) * 1.2;
      const maxHs  = 100;

      chart.setOption({
        backgroundColor: 'transparent',
        legend: {
          data: players.map(p => p.name),
          textStyle: { color: '#9ca3af' },
          bottom: 0,
        },
        radar: {
          indicator: [
            { name: 'K/D',    max: maxKd },
            { name: 'KPM',    max: maxKpm },
            { name: '命中率', max: maxAcc },
            { name: '胜率',   max: maxWin },
            { name: '复活贡献', max: maxRev },
            { name: '爆头率', max: maxHs },
          ],
          axisName: { color: '#d1d5db', fontSize: 12 },
          splitLine: { lineStyle: { color: '#374151' } },
          splitArea: { areaStyle: { color: ['rgba(55,65,81,.1)', 'rgba(55,65,81,.2)'] } },
          axisLine: { lineStyle: { color: '#374151' } },
        },
        series: [{
          type: 'radar',
          data: statsArr.map((s, i) => ({
            name: players[i].name,
            value: [
              parseFloat(s.killDeath) || 0,
              parseFloat(s.killsPerMinute) || 0,
              parseFloat(s.accuracy) || 0,
              parseFloat(s.winPercent) || (s.wins / (s.wins + s.loses) * 100) || 0,
              s.revives || 0,
              parseFloat(s.headshots) || 0,
            ],
            lineStyle: { color: COLORS[i], width: 2 },
            areaStyle: { color: COLORS[i], opacity: .15 },
            itemStyle: { color: COLORS[i] },
          })),
        }],
        tooltip: { backgroundColor: '#242933', borderColor: '#374151', textStyle: { color: '#f3f4f6' } },
      });
      window.addEventListener('resize', () => chart.resize());
    }

    // 对比表格
    function renderTable(players, statsArr) {
      const metrics = [
        { label: 'K/D',        get: s => ({ val: formatDecimal(s.killDeath),      raw: s.killDeath }),       higher: true },
        { label: '步兵K/D',    get: s => ({ val: formatDecimal(s.infantryKillDeath), raw: s.infantryKillDeath }), higher: true },
        { label: '胜率',       get: s => ({ val: formatPct(s.winPercent),          raw: parseFloat(s.winPercent) }), higher: true },
        { label: '击杀数',     get: s => ({ val: formatNum(s.kills),               raw: s.kills }),            higher: true },
        { label: '死亡数',     get: s => ({ val: formatNum(s.deaths),              raw: s.deaths }),           higher: false },
        { label: 'KPM',        get: s => ({ val: formatDecimal(s.killsPerMinute),  raw: s.killsPerMinute }),   higher: true },
        { label: '命中率',     get: s => ({ val: formatPct(s.accuracy),            raw: parseFloat(s.accuracy) }), higher: true },
        { label: '爆头率',     get: s => ({ val: formatPct(s.headshots),           raw: parseFloat(s.headshots) }), higher: true },
        { label: '场均击杀',   get: s => ({ val: formatDecimal(s.killsPerMatch),   raw: s.killsPerMatch }),    higher: true },
        { label: '场均伤害',   get: s => ({ val: formatNum(Math.round(s.damagePerMatch)), raw: s.damagePerMatch }), higher: true },
        { label: '对局数',     get: s => ({ val: formatNum(s.matchesPlayed),       raw: s.matchesPlayed }),    higher: true },
        { label: '游戏时长',   get: s => ({ val: formatSeconds(s.secondsPlayed),   raw: s.secondsPlayed }),    higher: true },
        { label: '复活次数',   get: s => ({ val: formatNum(s.revives),             raw: s.revives }),          higher: true },
        { label: '治疗次数',   get: s => ({ val: formatNum(s.heals),               raw: s.heals }),            higher: true },
        { label: '总伤害',     get: s => ({ val: formatNum(s.damage),              raw: s.damage }),           higher: true },
      ];

      const thead = document.querySelector('#compareTable thead');
      const tbody = document.querySelector('#compareTable tbody');

      thead.innerHTML = `<tr class="border-b border-gray-700">
        <th class="text-left py-2 pr-4 text-gray-500 font-medium w-28">指标</th>
        ${players.map((p, i) => `
          <th class="text-center py-2 px-3 font-semibold" style="color:${COLORS[i]}">
            <a href="${buildPlayerUrl(p.game, p.name, p.platform)}" class="hover:underline">${p.name}</a>
            <div class="text-xs font-normal text-gray-500">${PLATFORM_LABELS[p.platform] || p.platform}</div>
          </th>`).join('')}
      </tr>`;

      tbody.innerHTML = metrics.map(m => {
        const cells = statsArr.map(s => m.get(s));
        const raws  = cells.map(c => c.raw ?? 0).map(Number);
        const best  = m.higher ? Math.max(...raws) : Math.min(...raws);
        return `<tr class="border-b border-gray-700/40 hover:bg-gray-800/30">
          <td class="py-2 pr-4 text-gray-400 text-xs">${m.label}</td>
          ${cells.map((c, i) => {
            const isBest = raws.length > 1 && raws[i] === best;
            return `<td class="text-center py-2 px-3 ${isBest ? 'best-val' : 'text-gray-200'}">${c.val}</td>`;
          }).join('')}
        </tr>`;
      }).join('');
    }

    // 主逻辑
    document.getElementById('compareBtn').addEventListener('click', async () => {
      const players = getSlotValues();
      if (players.length < 2) {
        alert('请至少输入 2 名玩家');
        return;
      }

      document.getElementById('results').classList.add('hidden');
      const loadingEl = document.getElementById('loadingState');
      loadingEl.classList.remove('hidden');
      loadingEl.classList.add('flex');

      try {
        // 直接查询每个玩家选择的平台
        const statsArr = await Promise.all(
          players.map(async p => {
            try {
              const s = await getStats(p.game, p.name, p.platform);
              saveSnapshot(p.game, p.platform, p.name, s);
              saveRecentSearch(p.game, p.platform, p.name);
              return s;
            } catch (e) {
              throw new Error(`${p.name} 无可用数据`);
            }
          })
        );

        loadingEl.classList.add('hidden');
        loadingEl.classList.remove('flex');
        document.getElementById('results').classList.remove('hidden');

        renderRadar(players, statsArr);
        renderTable(players, statsArr);

        // 保存最近对比记录
        const slotValues = getSlotValues();
        if (slotValues.length >= 2) {
          saveRecentCompare(gameSelect.value, slotValues.map(s => ({ name: s.name, platform: s.platform })));
          renderRecentCompares();
        }
      } catch (err) {
        loadingEl.classList.add('hidden');
        loadingEl.classList.remove('flex');
        alert('查询失败：' + err.message);
      }
    });

    // ── 最近对比渲染 ──
    const PLATFORM_ICON_MAP = { xbox:'xbox', xboxone:'xbox', xboxseries:'xbox', steam:'steam', ea:'ea', epic:'ea', psn:'playstation', ps4:'playstation', ps5:'playstation', playstation:'playstation', pc:'pc' };
    const PLATFORM_LABEL_MAP = { xbox:'Xbox', xboxone:'Xbox', xboxseries:'Xbox', steam:'Steam', ea:'EA', epic:'EA', psn:'PlayStation', ps4:'PlayStation', ps5:'PlayStation', playstation:'PlayStation', pc:'PC' };

    function renderRecentCompares() {
      const list = getRecentCompares();
      const section = document.getElementById('recentCompareSection');
      if (!list.length) { section.style.display = 'none'; return; }
      section.style.display = '';
      document.getElementById('recentCompareList').innerHTML = list.map((r, idx) => {
        const names = r.players.map(p => {
          const icon = PLATFORM_ICON_MAP[p.platform?.toLowerCase()] || 'pc';
          const label = PLATFORM_LABEL_MAP[p.platform?.toLowerCase()] || p.platform || '—';
          return `<span class="inline-flex items-center gap-1"><span class="text-gray-300">${p.name}</span><span class="inline-flex items-center gap-1 text-xs font-semibold px-2 py-0.5 rounded-full bg-accent/10 text-accent"><img src="icons/${icon}.svg" class="w-3.5 h-3.5" alt="">${label}</span></span>`;
        }).join('<span class="text-gray-600 mx-1">vs</span>');
        return `<div class="group relative flex items-center bg-card border border-gray-700 hover:border-accent recent-chip rounded-full pl-3 pr-2 py-1 text-sm transition-colors cursor-pointer" data-compare-idx="${idx}">
          <span class="flex items-center gap-1 flex-1 min-w-0 flex-wrap">${names}</span>
          <button data-remove-idx="${idx}" class="remove-compare-btn ml-2 text-gray-600 hover:text-red-400 transition-colors leading-none text-base px-1">&times;</button>
        </div>`;
      }).join('');

      // 点击快速发起对比
      document.querySelectorAll('[data-compare-idx]').forEach(el => {
        el.addEventListener('click', e => {
          if (e.target.closest('.remove-compare-btn')) return;
          const idx = parseInt(el.dataset.compareIdx);
          const item = getRecentCompares()[idx];
          if (!item) return;
          gameSelect.value = item.game;
          MAX = Math.min(item.players.length, 4);
          renderSlots();
          // 填充玩家数据
          setTimeout(() => {
            item.players.forEach((p, i) => {
              const nameEl = document.querySelector(`[data-slot="${i}"][data-field="name"]`);
              const platEl = document.querySelector(`[data-slot="${i}"][data-field="platform"]`);
              if (nameEl) nameEl.value = p.name;
              if (platEl) {
                const cat = PLATFORM_CATEGORY_MAP[p.platform.toLowerCase()] || p.platform;
                platEl.value = cat;
              }
            });
          }, 50);
        });
      });

      // 删除按钮
      document.querySelectorAll('.remove-compare-btn').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          removeRecentCompare(parseInt(btn.dataset.removeIdx));
          renderRecentCompares();
        });
      });
    }

    document.getElementById('clearCompareBtn').addEventListener('click', () => {
      clearRecentCompares();
      renderRecentCompares();
    });

    renderRecentCompares();

    // URL 预填时自动触发对比
    if (preName) {
      setTimeout(() => document.getElementById('compareBtn').click(), 100);
    }
  </script>
  <script>
  document.addEventListener('keydown', e => {
    if (e.key === '/' && !['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) {
      e.preventDefault();
      const searchInput = document.querySelector('#nameInput');
      if (searchInput) searchInput.focus();
    }
  });</script>

    </div>
</div>

  <!-- 页脚 -->
  <footer class="border-t border-gray-700 mt-12">
    <div class="max-w-5xl mx-auto px-4 py-8">
      <div class="flex flex-col sm:flex-row items-center justify-between gap-4">
        <div class="text-center sm:text-left">
          <a href="index.html" class="text-lg font-bold gradient-text">BF Tracker</a>
          <p class="text-xs text-gray-500 mt-1">战地系列战绩查询 · 全平台数据 · 免费开源</p>
        </div>
        <div class="flex items-center gap-6 text-xs text-gray-500">
          <a href="index.html" class="hover:text-gray-300 transition-colors footer-link">首页</a>
          <a href="news.html" aria-label="新闻" class="nav-link hover:text-white pb-1">新闻</a>
        <a href="compare.html" class="hover:text-gray-300 transition-colors footer-link">多人对比</a>
          <a href="https://github.com/MineonStudio/BFTracker" target="_blank" class="hover:text-gray-300 transition-colors footer-link">GitHub</a>
        </div>
      </div>
      <p class="text-center text-xs text-gray-600 mt-6">&copy; 2026 BF Tracker · Powered by GameTools Network</p>
    </div>
  </footer>

</body>
</html>
