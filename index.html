<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta property="og:description" content="BF6 全平台战绩查询与数据分析">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://mineonstudio.github.io/BFTracker/">
  <meta name="description" content="BF6 全平台战绩查询与数据分析">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/input.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-dark text-gray-200 min-h-screen flex flex-col">
  <script>(function(){if(localStorage.theme==='light')document.body.classList.add('light')})()</script>

  <nav class="border-b border-gray-700 bg-card sticky top-0 z-10">
    <div class="max-w-5xl mx-auto px-4 h-14 flex items-center justify-between">
      <a href="index.html" class="text-xl font-bold gradient-text">BF Tracker</a>
      <div class="flex gap-6 text-sm text-gray-400">
        <a href="index.html" aria-label="首页" class="nav-link active pb-1">战绩查询</a>
        <a href="news.html" aria-label="新闻" class="nav-link hover:text-white pb-1">战地新闻</a>
        <a href="compare.html" aria-label="多人对比" class="nav-link hover:text-white pb-1">多人对比</a>
      </div>
    </div>
  </nav>

  <div class="flex-1">
    <div class="max-w-5xl mx-auto px-4 pt-8 sm:pt-16 pb-6 sm:pb-10 text-center">
      <div class="flex items-center justify-center gap-4 mb-8">
        <img src="icons/bf_logo.svg" class="h-10 sm:h-12 opacity-70" alt="BF">
        <img src="icons/bf_wordmark.svg" class="h-5 sm:h-6 opacity-80 mt-1" alt="BATTLEFIELD">
      </div>
      <div class="flex flex-col sm:flex-row gap-3 max-w-2xl mx-auto">
        <input type="hidden" id="gameSelect" value="bf6">
        <div class="flex flex-row gap-3 w-full sm:flex-none">
          <select id="platformSelect" class="search-input w-[35%] sm:w-36 bg-transparent border border-gray-700 text-white px-4 py-2.5 text-sm focus:outline-none focus:border-blue-500"></select>
          <input id="nameInput" type="text" placeholder="输入玩家用户名..." class="search-input flex-1 bg-transparent border border-gray-700 text-white px-4 py-2.5 text-sm focus:outline-none focus:border-blue-500" />
        </div>
        <button id="searchBtn" class="bg-white text-black px-4 py-2.5 text-sm hover:opacity-85 transition-opacity w-full sm:w-auto">查询</button>
      </div>
      <datalist id="recentPlayers"></datalist>
    </div>

    <div class="max-w-5xl mx-auto px-4 pb-16" id="recentSection" style="display:none">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-xs sm:text-sm font-semibold text-gray-500 uppercase tracking-wider">最近搜索</h2>
        <button id="clearAllBtn" class="text-xs text-gray-500 hover:text-red-400 transition-colors">清除全部</button>
      </div>
      <div id="recentList" class="flex flex-wrap gap-2"></div>
    </div>

  </div>

  <footer class="border-t border-gray-700 sticky bottom-0 z-10">
    <div class="max-w-5xl mx-auto px-4 py-3">
      <div class="flex flex-col sm:flex-row items-center justify-between gap-4">
        <div class="text-center sm:text-left">
          <a href="index.html" class="text-lg font-bold gradient-text">BF Tracker</a>
        </div>
      </div>
      <p class="text-center text-xs text-gray-600 mt-2">&copy; 2026 BF Tracker &middot; Powered by GameTools Network</p>
    </div>
  </footer>

  <script type="module">
    import { PLATFORM_KEYS, PLATFORM_LABELS } from './js/api.js';
    import { getRecentSearches, saveRecentSearch, removeRecentSearch, clearRecentSearches } from './js/storage.js';
    import { buildPlayerUrl, formatNum } from './js/utils.js';

    const PLATFORM_ICON = { xbox:'xbox', xboxone:'xbox', xboxseries:'xbox', steam:'steam', ea:'ea', epic:'ea', psn:'playstation', ps4:'playstation', ps5:'playstation', playstation:'playstation', pc:'pc' };
    const PLATFORM_LABEL = { xbox:'Xbox', xboxone:'Xbox', xboxseries:'Xbox', steam:'Steam', ea:'EA', epic:'EA', psn:'PlayStation', ps4:'PlayStation', ps5:'PlayStation', playstation:'PlayStation', pc:'PC' };

    function getIcon(p) { return PLATFORM_ICON[p?.toLowerCase()] || 'pc'; }
    function getLabel(p) { return PLATFORM_LABEL[p?.toLowerCase()] || p || '—'; }

    const gameSelect = document.getElementById('gameSelect');
    const platformSelect = document.getElementById('platformSelect');
    const nameInput = document.getElementById('nameInput');
    const searchBtn = document.getElementById('searchBtn');

    PLATFORM_KEYS.forEach(key => {
      const opt = document.createElement('option');
      opt.value = key;
      opt.textContent = PLATFORM_LABELS[key] || key;
      platformSelect.appendChild(opt);
    });

    function doSearch() {
      const name = nameInput.value.trim();
      if (!name) { nameInput.focus(); return; }
      const game = 'bf6';
      const platform = platformSelect.value;
      saveRecentSearch(game, platform, name);
      window.location.href = buildPlayerUrl(game, name, platform);
    }
    searchBtn.addEventListener('click', doSearch);
    nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

    nameInput.addEventListener('focus', () => {
      const section = document.getElementById('recentSection');
      if (section && section.style.display !== 'none') return;
      if (getRecentSearches().length) {
        document.getElementById('recentSection').style.display = '';
        renderRecent();
      }
    });

    function renderRecent() {
      const list = getRecentSearches();
      const dl = document.getElementById('recentPlayers');
      if (dl && list.length) dl.innerHTML = list.map(r => `<option value="${r.name}">`).join('');
      const section = document.getElementById('recentSection');
      if (!list.length) { section.style.display = 'none'; return; }
      section.style.display = '';
      document.getElementById('recentList').innerHTML = list.map(r => `
        <div class="group relative flex items-center bg-card border border-gray-700 hover:border-accent recent-chip rounded-full pl-3 pr-2 py-1 text-sm transition-colors">
          <a href="${buildPlayerUrl(r.game, r.name, r.platform)}" class="flex items-center gap-1.5 flex-1 min-w-0">
            <span class="text-gray-300 truncate">${r.name}</span>
            <span class="inline-flex items-center gap-1 text-xs font-semibold px-2 py-0.5 rounded-full bg-accent/10 text-accent shrink-0"><img src="icons/${getIcon(r.platform)}.svg" class="w-3.5 h-3.5" alt="">${getLabel(r.platform)}</span>
          </a>
          <button data-game="${r.game}" data-platform="${r.platform}" data-name="${r.name}"
            class="remove-btn ml-1 text-gray-600 hover:text-red-400 transition-colors leading-none text-base px-1">&times;</button>
        </div>
      `).join('');
      document.querySelectorAll('.remove-btn').forEach(btn => {
        btn.addEventListener('click', e => {
          e.preventDefault();
          removeRecentSearch(btn.dataset.game, btn.dataset.platform, btn.dataset.name);
          renderRecent();
        });
      });
    }
    renderRecent();

    document.getElementById('clearAllBtn').addEventListener('click', () => { clearRecentSearches(); renderRecent(); });

  </script>
  <script>
    document.addEventListener('keydown', e => {
      if (e.key === '/' && !['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) {
        e.preventDefault();
        document.querySelector('#nameInput')?.focus();
      }
    });
  </script>
</body>
</html>
