<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>战地战绩查询</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
  <script>
    tailwind.config = {
      theme: { extend: { colors: { accent: '#ff4655', dark: '#1a1e26', card: '#242933' } } }
    }
  </script>
</head>
<body class="bg-dark text-gray-200 min-h-screen">

  <!-- 导航 -->
  <nav class="border-b border-gray-700 bg-card">
    <div class="max-w-5xl mx-auto px-4 h-14 flex items-center justify-between">
      <a href="index.html" class="text-xl font-bold gradient-text">BF Tracker</a>
      <div class="flex gap-6 text-sm text-gray-400">
        <a href="index.html" class="nav-link active pb-1">首页</a>
        <a href="compare.html" class="nav-link hover:text-white pb-1">多人对比</a>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <div class="max-w-5xl mx-auto px-4 pt-16 pb-10 text-center">
    <h1 class="text-4xl font-bold mb-3">
      <span class="gradient-text">战地战绩查询</span>
    </h1>
    <p class="text-gray-400 mb-10">支持 BF6 / BF2042 / BFV / BF1 / BF4 · 全平台查询 · 数据分析</p>

    <!-- 搜索卡片 -->
    <div class="bg-card rounded-2xl p-6 shadow-xl max-w-2xl mx-auto">
      <div class="flex gap-3 mb-3">
        <!-- 游戏选择 -->
        <select id="gameSelect"
          class="bg-dark border border-gray-600 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-accent">
        </select>
      </div>
      <div class="flex gap-3">
        <input id="nameInput" type="text" placeholder="输入玩家用户名，自动匹配全平台..."
          class="search-input flex-1 bg-dark border border-gray-600 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-accent"
        />
        <button id="searchBtn"
          class="bg-accent hover:bg-red-500 text-white font-semibold px-6 py-3 rounded-lg text-sm transition-colors">
          查询
        </button>
      </div>
    </div>
  </div>

  <!-- 多游戏在线状态 -->
  <div class="max-w-5xl mx-auto px-4 mb-10">
    <div id="statusBar" class="bg-card rounded-xl px-5 py-4 grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3 text-sm">
      <span class="col-span-full text-gray-500 text-xs">正在加载在线状态…</span>
    </div>
    <!-- 区域详情面板 -->
    <div id="statusDetail" class="hidden bg-card rounded-xl px-5 py-4 mt-3 text-sm"></div>
    <p class="text-xs text-gray-600 mt-2 px-1">* 仅统计 Portal 社区服务器在线人数，不含 EA 官方匹配服务器；点击游戏查看区域分布</p>
  </div>

  <!-- 最近搜索 -->
  <div class="max-w-5xl mx-auto px-4 pb-16" id="recentSection" style="display:none">
    <div class="flex items-center justify-between mb-3">
      <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wider">最近搜索</h2>
      <button id="clearAllBtn" class="text-xs text-gray-500 hover:text-red-400 transition-colors">清除全部</button>
    </div>
    <div id="recentList" class="flex flex-wrap gap-2"></div>
  </div>

  <script type="module">
    import { GAME_LABELS } from './js/api.js';
    import { getRecentSearches, saveRecentSearch, removeRecentSearch, clearRecentSearches } from './js/storage.js';
    import { buildPlayerUrl, formatNum } from './js/utils.js';

    const gameSelect = document.getElementById('gameSelect');
    const nameInput  = document.getElementById('nameInput');
    const searchBtn  = document.getElementById('searchBtn');

    // 填充游戏下拉
    Object.entries(GAME_LABELS).forEach(([val, label]) => {
      gameSelect.innerHTML += `<option value="${val}">${label}</option>`;
    });

    // 搜索跳转
    function doSearch() {
      const name = nameInput.value.trim();
      if (!name) { nameInput.focus(); return; }
      const game = gameSelect.value;
      saveRecentSearch(game, '', name);
      window.location.href = buildPlayerUrl(game, name);
    }
    searchBtn.addEventListener('click', doSearch);
    nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

    // 最近搜索
    function renderRecent() {
      const list = getRecentSearches();
      const section = document.getElementById('recentSection');
      if (!list.length) { section.style.display = 'none'; return; }
      section.style.display = '';
      document.getElementById('recentList').innerHTML = list.map(r => `
        <div class="group relative flex items-center bg-card border border-gray-700 hover:border-accent rounded-full pl-4 pr-2 py-1.5 text-sm transition-colors">
          <a href="${buildPlayerUrl(r.game, r.name)}" class="flex items-center gap-2 flex-1">
            <span class="text-accent font-semibold">${GAME_LABELS[r.game] || r.game}</span>
            <span class="text-gray-300">${r.name}</span>
          </a>
          <button data-game="${r.game}" data-name="${r.name}"
            class="remove-btn ml-2 text-gray-600 hover:text-red-400 transition-colors leading-none text-base px-1">×</button>
        </div>
      `).join('');

      document.querySelectorAll('.remove-btn').forEach(btn => {
        btn.addEventListener('click', e => {
          e.preventDefault();
          removeRecentSearch(btn.dataset.game, btn.dataset.name);
          renderRecent();
        });
      });
    }
    renderRecent();

    document.getElementById('clearAllBtn').addEventListener('click', () => {
      clearRecentSearches();
      renderRecent();
    });

    // 多游戏在线状态
    const STATUS_GAMES = [
      { key: 'bf6',    label: 'BF6' },
      { key: 'bf2042', label: 'BF2042' },
      { key: 'bfv',    label: 'BFV' },
      { key: 'bf1',    label: 'BF1' },
      { key: 'bf4',    label: 'BF4' },
      { key: 'bf3',    label: 'BF3' },
    ];

    const statusRawData = {};  // game key → raw API data

    async function fetchGameStatus(game) {
      const res = await fetch(`https://api.gametools.network/${game}/status/`);
      const data = await res.json();
      statusRawData[game] = data;
      const regions = data.regions || {};
      const all = regions['ALL'] || regions['all'] || Object.values(regions)[0] || {};
      const amounts = all.amounts || {};
      return {
        players: amounts.soldierAmount ?? amounts.playerAmount ?? 0,
        servers: amounts.serverAmount ?? 0,
      };
    }

    const REGION_CN = {
      'EU': '欧洲', 'NA': '北美', 'Asia': '亚洲', 'OC': '大洋洲',
      'SA': '南美', 'AF': '非洲', 'ME': '中东', 'ALL': '全部',
    };
    const PLATFORM_CN = { 'PC': 'PC', 'XBL': 'Xbox', 'PSN': 'PS', 'all': '全平台' };

    let activeGameKey = null;

    window.showStatusDetail = function(gameKey, label) {
      const detailEl = document.getElementById('statusDetail');
      const raw = statusRawData[gameKey];
      if (!raw) { detailEl.classList.add('hidden'); return; }

      if (activeGameKey === gameKey) {
        // toggle off
        activeGameKey = null;
        detailEl.classList.add('hidden');
        document.querySelectorAll('.status-card').forEach(c => c.classList.remove('ring-1', 'ring-accent'));
        return;
      }
      activeGameKey = gameKey;
      document.querySelectorAll('.status-card').forEach(c => c.classList.remove('ring-1', 'ring-accent'));
      document.querySelector(`.status-card[data-key="${gameKey}"]`)?.classList.add('ring-1', 'ring-accent');

      const regions = raw.regions || {};
      const regionEntries = Object.entries(regions)
        .filter(([k]) => k !== 'ALL' && k !== 'all')
        .map(([k, v]) => {
          const amt = v.amounts || {};
          return {
            name: REGION_CN[k] || k,
            players: amt.soldierAmount ?? amt.playerAmount ?? 0,
            servers: amt.serverAmount ?? 0,
          };
        })
        .filter(r => r.players > 0)
        .sort((a, b) => b.players - a.players);

      // platform breakdown (if available)
      const platforms = raw.platforms || {};
      const platformEntries = Object.entries(platforms)
        .map(([k, v]) => {
          const amt = (v.amounts || v || {});
          return {
            name: PLATFORM_CN[k] || k,
            players: amt.soldierAmount ?? amt.playerAmount ?? v.soldierAmount ?? 0,
          };
        })
        .filter(p => p.players > 0)
        .sort((a, b) => b.players - a.players);

      let html = `<div class="flex items-center gap-3 mb-4">
        <span class="text-sm font-bold text-accent">${label}</span>
        <span class="text-xs text-gray-500">区域在线分布</span>
      </div>`;

      if (regionEntries.length) {
        html += `<div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-3 mb-4">
          ${regionEntries.map(r => `
            <div class="bg-dark rounded-lg px-3 py-2">
              <p class="text-xs font-semibold text-gray-300">${r.name}</p>
              <p class="text-white font-bold text-sm">${formatNum(r.players)}<span class="text-gray-500 font-normal text-xs ml-1">人</span></p>
              <p class="text-gray-600 text-xs">${formatNum(r.servers)} 服务器</p>
            </div>`).join('')}
        </div>`;
      } else {
        html += `<p class="text-gray-600 text-xs mb-4">暂无区域分布数据</p>`;
      }

      if (platformEntries.length) {
        html += `<div class="flex gap-4 text-xs text-gray-500 border-t border-gray-700 pt-3">
          <span class="text-gray-400 font-medium">平台分布：</span>
          ${platformEntries.map(p => `<span>${p.name} <span class="text-white font-semibold">${formatNum(p.players)}</span></span>`).join('')}
        </div>`;
      }

      detailEl.innerHTML = html;
      detailEl.classList.remove('hidden');
    }

    const bar = document.getElementById('statusBar');
    Promise.all(STATUS_GAMES.map(g =>
      fetchGameStatus(g.key).then(s => ({ ...g, ...s })).catch(() => ({ ...g, players: null, servers: null }))
    )).then(results => {
      bar.innerHTML = results.map(r => `
        <div class="status-card flex flex-col gap-1 cursor-pointer rounded-lg px-2 py-1 hover:bg-gray-800/40 transition-colors" data-key="${r.key}" onclick="showStatusDetail('${r.key}','${r.label}')">
          <span class="text-xs font-semibold text-accent">${r.label}</span>
          ${r.players === null
            ? `<span class="text-gray-600 text-xs">不可用</span>`
            : `<span class="text-white font-bold">${formatNum(r.players)}<span class="text-gray-500 font-normal text-xs ml-1">人</span></span>
               <span class="text-gray-500 text-xs">${formatNum(r.servers)} 服务器</span>`
          }
        </div>
      `).join('');
    });
  </script>
</body>
</html>
