  <script type="module">
    import { getStats, GAME_LABELS, PLATFORM_LABELS } from './js/api.js';
    import { saveSnapshot, saveRecentSearch, saveApiCache } from './js/storage.js';
    import * as echarts from 'echarts/core';
    import { PieChart, BarChart, LineChart, RadarChart } from 'echarts/charts';
    import { LegendComponent, TooltipComponent, GridComponent } from 'echarts/components';
    import { CanvasRenderer } from 'echarts/renderers';
    echarts.use([PieChart, BarChart, LineChart, RadarChart, LegendComponent, TooltipComponent, GridComponent, CanvasRenderer]);
    import { getInventory } from './js/api.js';
    import { MAP_CN, getModeName, CLASS_CN } from './js/constants.js';
    import { formatNum, formatPct, formatDecimal, formatSeconds, kdColor, winColor, getUrlParams } from './js/utils.js';

    // 从 URL 读取参数
    const { game, name, platform: urlPlatform } = getUrlParams();

    // ─── 图表渲染 ───────────────────────────────────────────
    function renderBarChart(el, labels, values, color = '#3b82f6') {
      requestAnimationFrame(() => {
        const chart = echarts.init(el, 'dark');
        chart.setOption({
          backgroundColor: 'transparent',
          grid: { left: 10, right: 50, top: 10, bottom: 10, containLabel: true },
          xAxis: { type: 'value', axisLabel: { color: '#9ca3af', fontSize: 11 }, splitLine: { lineStyle: { color: '#374151' } } },
          yAxis: { type: 'category', data: labels, axisLabel: { color: '#d1d5db', fontSize: 11 }, axisTick: { show: false } },
          series: [{
            type: 'bar', data: values, barMaxWidth: 24,
            itemStyle: { color: { type: 'linear', x: 0, y: 0, x2: 1, y2: 0, colorStops: [{ offset: 0, color }, { offset: 1, color: '#8b5cf6' }] }, borderRadius: [0, 4, 4, 0] },
            label: { show: true, position: 'right', color: '#9ca3af', fontSize: 11 },
          }],
          tooltip: { trigger: 'axis', backgroundColor: '#242933', borderColor: '#374151', textStyle: { color: '#f3f4f6' } },
        });
        window.addEventListener('resize', () => chart.resize());
      });
    }

    function renderPieChart(el, items) {
      requestAnimationFrame(() => {
        const chart = echarts.init(el, 'dark');
        chart.setOption({
          backgroundColor: 'transparent',
          tooltip: { trigger: 'item', backgroundColor: '#242933', borderColor: '#374151', textStyle: { color: '#f3f4f6' } },
          legend: { orient: 'vertical', right: '5%', top: 'middle', textStyle: { color: '#9ca3af', fontSize: 11 } },
          series: [{
            type: 'pie', radius: ['38%', '65%'], center: ['38%', '50%'],
            data: items,
            label: { show: true, formatter: '{d}%', fontSize: 11, color: '#d1d5db' },
            labelLine: { lineStyle: { color: '#4b5563' } },
            emphasis: { itemStyle: { shadowBlur: 10, shadowColor: 'rgba(0,0,0,.5)' } },
          }],
        });
        window.addEventListener('resize', () => chart.resize());
      });
    }

    function renderRadarChart(el, items) {
      requestAnimationFrame(() => {
        const chart = echarts.init(el, 'dark');
        const maxVal = Math.max(...items.map(i => i.value), 1);
        chart.setOption({
          backgroundColor: 'transparent',
          radar: {
            indicator: items.map(i => ({ name: i.name, max: Math.ceil(maxVal * 1.3) })),
            center: ['50%', '52%'],
            radius: '68%',
            axisName: { color: '#9ca3af', fontSize: 11 },
            splitArea: { areaStyle: { color: ['rgba(59,130,246,0.04)', 'rgba(59,130,246,0.08)'] } },
            splitLine: { lineStyle: { color: '#374151' } },
            axisLine: { lineStyle: { color: '#374151' } },
          },
          series: [{
            type: 'radar',
            data: [{ value: items.map(i => i.value), name: '' }],
            areaStyle: { color: 'rgba(59,130,246,0.15)' },
            lineStyle: { color: '#3b82f6', width: 2 },
            itemStyle: { color: '#3b82f6' },
            symbol: 'circle',
            symbolSize: 3,
          }],
          tooltip: { trigger: 'item', backgroundColor: '#242933', borderColor: '#374151', textStyle: { color: '#f3f4f6' } },
        });
        window.addEventListener('resize', () => chart.resize());
      });
    }



    function renderPlatformContent(container, { stats, allData, platform }) {
      const BASE = 'https://api.gametools.network';

      // 计算衍生数据
      const allClass = allData?.classes?.find(c => c.id === 'kit') || allData?.classes?.[0];
      // SPM：优先从 classes 计算，其次用 stats.scorePerMinute 直接字段
      const spm = (allClass?.score && allClass?.secondsPlayed)
        ? (allClass.score / (allClass.secondsPlayed / 60)).toFixed(2)
        : (stats.scorePerMinute != null ? parseFloat(stats.scorePerMinute).toFixed(2) : null);
      // matchesPlayed：字段不存在时用 wins + loses 兜底
      const matchesPlayed = stats.matchesPlayed ?? ((stats.wins != null && stats.loses != null) ? stats.wins + stats.loses : null);
      const deathsPerMatch = matchesPlayed
        ? ((allClass?.deaths ?? stats.deaths ?? 0) / matchesPlayed).toFixed(2) : null;
      const assists    = allClass?.assists ?? stats.killAssists;
      const humanKills = stats.dividedKills?.human || stats.kills || 0;
      const humanKd    = stats.deaths ? (humanKills / stats.deaths) : 0;
      const humanKillsPerMatch = matchesPlayed ? (humanKills / matchesPlayed) : 0;

      // 提取等级数据
      const rankVal = stats.rank ?? stats.level ?? stats.currentRank ?? stats.rankNumber ?? stats.prestige ??
                      allData?.rank ?? null;
      const rankName = allData?.rankName ?? null;

      container.innerHTML = `
        <!-- 玩家总览 -->
        <div>
<!-- 玩家信息：左中右三栏布局 -->
          <div class="flex items-end gap-4 mb-6">
            <!-- 左侧：等级图标 -->
            <div class="shrink-0 w-16 h-16 flex items-center justify-center">
              ${allData?.rankImage?.small
                ? `<img src="${allData.rankImage.small}" class="w-16 h-16 object-contain" alt="">`
                : `<div class="w-14 h-14 rounded-full bg-gray-700/50 flex items-center justify-center">
                     <span class="text-lg font-black text-gray-400">${rankVal ?? '?'}</span>
                   </div>`}
            </div>
            <!-- 中间：玩家名 + 等级/时长 -->
            <div class="flex-1 min-w-0">
              <h1 class="text-2xl sm:text-3xl font-black text-white tracking-tight truncate">${stats.userName || name}</h1>
              <div class="flex items-center gap-2 mt-1 text-sm text-gray-400">
                <span class="font-semibold" style="color:${rankVal != null ? (rankVal >= 250 ? '#f87171' : '#60a5fa') : '#9ca3af'}">Lv.${rankVal ?? '—'}</span>
                <span class="text-gray-600">·</span>
                <span>${formatSeconds(stats.secondsPlayed)}</span>
              </div>
            </div>
            <!-- 右侧：平台 + 分享 -->
            <div class="shrink-0 self-end flex items-end gap-2">
              ${(() => { const p = (platform || '').toLowerCase(); const iconMap = {xbox:'xbox',xboxone:'xbox',xboxseries:'xbox',steam:'steam',ea:'ea',epic:'ea',psn:'playstation',ps4:'playstation',ps5:'playstation',playstation:'playstation',pc:'pc'}; const labelMap = {xbox:'Xbox',steam:'Steam',ea:'EA',playstation:'PlayStation',pc:'PC'}; const icon = iconMap[p] || 'pc'; const label = labelMap[icon] || 'PC'; return `<span class="inline-flex items-center gap-1.5 text-xs font-semibold px-2.5 py-1 rounded-full bg-accent/10 text-accent"><img src="icons/${icon}.svg" class="w-4 h-4" alt="">${label}</span>`; })()}
              <button onclick="window.doSharePoster()" class="text-gray-400 hover:text-white transition-colors self-end flex items-end" title="分享">
                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/>
                  <polyline points="16 6 12 2 8 6"/>
                  <line x1="12" y1="2" x2="12" y2="15"/>
                </svg>
              </button>
            </div>
          </div>
        <!-- Tab导航（始终显示） -->
        <div id="detailTabs-${platform}" class="mb-8">
          <div class="flex gap-1 mb-4 border-b border-gray-700" id="tabNav-${platform}">
            <button class="tab-btn active" data-tab="overview" onclick="window._switchTab('overview','${platform}')">概览</button>
            <button class="tab-btn" data-tab="class" onclick="window._switchTab('class','${platform}')">兵种</button>
            <button class="tab-btn" data-tab="kills" onclick="window._switchTab('kills','${platform}')">击杀</button>
            <button class="tab-btn" data-tab="wins" onclick="window._switchTab('wins','${platform}')">胜率</button>
            <button class="tab-btn" data-tab="support" onclick="window._switchTab('support','${platform}')">贡献</button>
            <button class="tab-btn" data-tab="season" onclick="window._switchTab('season','${platform}')">赛季</button>
          </div>
          <!-- 概览 -->
          <div id="tab-overview-${platform}" class="tab-panel">
            <div class="bg-card  p-5 mb-8">
              <!-- KD + 胜率 -->
              <div class="grid grid-cols-2 gap-4 mb-4">
                <div class="bg-dark p-4 hover-lift">
                  <p class="text-2xl sm:text-4xl font-black count-animate" style="color:${kdColor(humanKd)}">${formatDecimal(humanKd)}</p>
                  <p class="text-xs text-gray-500 mt-1">K/D</p>
                  <div class="flex gap-4 mt-3 text-sm">
                    <div><p class="text-white font-semibold">${formatNum(humanKills)}</p><p class="text-xs text-gray-500">击杀</p></div>
                    <div><p class="text-white font-semibold">${formatNum(stats.deaths)}</p><p class="text-xs text-gray-500">死亡</p></div>
                  </div>
                </div>
                <div class="bg-dark p-4 flex flex-col justify-between hover-lift">
                  <div>
                    <p class="text-2xl sm:text-4xl font-black count-animate" style="color:${winColor(parseFloat(stats.winPercent))}">${formatPct(stats.winPercent)}</p>
                    <p class="text-xs text-gray-500 mt-1">胜率</p>
                  </div>
                  <div class="flex gap-4 mt-3 text-sm">
                    <div><p class="text-white font-semibold">${formatNum(matchesPlayed)}</p><p class="text-xs text-gray-500">总场次</p></div>
                    <div><p class="text-white font-semibold">${formatNum(stats.wins)}</p><p class="text-xs text-gray-500">胜场</p></div>
                  </div>
                </div>
              </div>
              <!-- 9 个指标：三行三列 -->
              <div class="grid grid-cols-3 gap-1.5 sm:gap-3">
                <div class="bg-dark p-2 sm:p-3 hover-lift"><p class="text-sm sm:text-lg font-bold text-white">${spm ?? '—'}</p><p class="text-xs text-gray-500">每分钟得分</p></div>
                <div class="bg-dark p-2 sm:p-3 hover-lift"><p class="text-sm sm:text-lg font-bold text-white">${formatPct(stats.headshots)}</p><p class="text-xs text-gray-500">爆头率</p></div>
                <div class="bg-dark p-2 sm:p-3 hover-lift"><p class="text-sm sm:text-lg font-bold text-white">${formatPct(stats.accuracy)}</p><p class="text-xs text-gray-500">命中率</p></div>
                <div class="bg-dark p-2 sm:p-3 hover-lift"><p class="text-sm sm:text-lg font-bold text-white">${formatDecimal(stats.killsPerMinute)}</p><p class="text-xs text-gray-500">KPM</p></div>
                <div class="bg-dark p-2 sm:p-3 hover-lift"><p class="text-sm sm:text-lg font-bold text-white">${formatDecimal(humanKillsPerMatch)}</p><p class="text-xs text-gray-500">场均击杀</p></div>
                <div class="bg-dark p-2 sm:p-3 hover-lift"><p class="text-sm sm:text-lg font-bold text-white">${deathsPerMatch ?? '—'}</p><p class="text-xs text-gray-500">场均死亡</p></div>
                <div class="bg-dark p-2 sm:p-3 hover-lift"><p class="text-sm sm:text-lg font-bold text-white">${formatNum(stats.headShots)}</p><p class="text-xs text-gray-500">爆头数</p></div>
                <div class="bg-dark p-2 sm:p-3 hover-lift"><p class="text-sm sm:text-lg font-bold text-white">${formatNum(assists)}</p><p class="text-xs text-gray-500">助攻数</p></div>
                <div class="bg-dark p-2 sm:p-3 hover-lift"><p class="text-sm sm:text-lg font-bold text-white">${formatNum(stats.revives)}</p><p class="text-xs text-gray-500">急救数</p></div>
              </div>
            </div>
            <!-- 最擅长/最喜欢 -->
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mt-4">
              <div class="bg-dark p-3 hover-lift">
                <p class="text-xs text-gray-500 mb-1">最擅长兵种</p>
                <p class="text-sm font-semibold text-white truncate">${(() => {
                  const cs = (allData?.classes || []).filter(c => c.className !== 'All' && c.kills > 0);
                  if (!cs.length) return '—';
                  const scored = cs.map(c => ({ ...c, score: ((c.kills || 0) / (c.deaths || 1)) * Math.sqrt(c.kills || 0) })).sort((a, b) => b.score - a.score);
                  const best = scored[0]; return best ? (CLASS_CN[best.className] || best.className) : '—';
                })()}</p>
              </div>
              <div class="bg-dark p-3 hover-lift">
                <p class="text-xs text-gray-500 mb-1">最擅长武器</p>
                <p class="text-sm font-semibold text-white truncate">${(() => {
                  const ws = (allData?.weapons || []).filter(w => w.kills > 0).map(w => ({ ...w, score: (w.kills || 0) * Math.sqrt(w.killsPerMinute || 0.01) })).sort((a, b) => b.score - a.score);
                  const best = ws[0]; return best?.name || best?.weaponName || '—';
                })()}</p>
              </div>
              <div class="bg-dark p-3 hover-lift">
                <p class="text-xs text-gray-500 mb-1">最喜欢地图</p>
                <p class="text-sm font-semibold text-white truncate">${(() => {
                  const ms = (allData?.maps || []).filter(m => m.mapName !== 'All' && m.matches > 0).map(m => ({ ...m, score: (m.secondsPlayed || 0) * (parseFloat(m.winPercent || 50) / 50) })).sort((a, b) => b.score - a.score);
                  return MAP_CN[ms[0]?.mapName] || ms[0]?.mapName || '—';
                })()}</p>
              </div>
              <div class="bg-dark p-3 hover-lift">
                <p class="text-xs text-gray-500 mb-1">最喜欢模式</p>
                <p class="text-sm font-semibold text-white truncate">${(() => {
                  const gms = (allData?.gameModes || allData?.gamemodes || []).filter(m => m.matches > 0 && m.gamemodeName !== 'Official').map(m => ({ ...m, score: (m.secondsPlayed || 0) * (parseFloat(m.winPercent || 50) / 50) })).sort((a, b) => b.score - a.score);
                  return getModeName(gms[0]?.gamemodeName) || '—';
                })()}</p>
              </div>
            </div>
          </div>
          <!-- 兵种 -->

              <div class="grid grid-cols-2 lg:grid-cols-4 gap-2 sm:gap-3" id="classCards-${platform}"></div>
            </div>
          </div>
          <!-- 击杀 -->
          <div id="tab-kills-${platform}" class="tab-panel hidden">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8" id="killsSection-${platform}">
              <div class="bg-card  p-5" id="weaponPanel-${platform}" style="display:none">
                <div class="flex items-center justify-between mb-4">
                  <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wider">武器击杀排行</h2>
                </div>
                <div id="weaponContent-${platform}" class="bar-animate"></div>
              </div>
              <div class="bg-card  p-5" id="vehiclePanel-${platform}" style="display:none">
                <div class="flex items-center justify-between mb-4">
                  <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wider">载具击杀排行</h2>
                </div>
                <div id="vehicleContent-${platform}" class="bar-animate"></div>
              </div>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
              <div class="bg-card  p-5">
                <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-4">击杀类型分布</h2>
                <div id="killTypeChart-${platform}" style="height:320px" class="w-full"></div>
              </div>
              <div class="bg-card  p-5">
                <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-4">兵种击杀分布</h2>
                <div id="classChart-${platform}" style="height:320px" class="w-full"></div>
              </div>
            </div>
          </div>
          <!-- 胜率 -->
          <div id="tab-wins-${platform}" class="tab-panel hidden">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8" id="winRateSection-${platform}">
              <div class="bg-card  p-5" id="mapSection-${platform}" style="display:none">
                <div class="flex items-center justify-between mb-4">
                  <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wider">地图胜率</h2>
                </div>
                <div id="mapContent-${platform}" class="bar-animate"></div>
              </div>
              <div class="bg-card  p-5" id="modeSection-${platform}" style="display:none">
                <div class="flex items-center justify-between mb-4">
                  <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wider">游戏模式胜率</h2>
                </div>
                <div id="modeContent-${platform}" class="bar-animate"></div>
              </div>
            </div>
          </div>
          <!-- 贡献 -->
          <div id="tab-support-${platform}" class="tab-panel hidden">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8" id="supportSection-${platform}">
              <div class="bg-card  p-5">
                <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-4">团队贡献</h2>
                <div id="supportStats-${platform}" class="grid grid-cols-2 gap-3 text-sm"></div>
              </div>
              <div class="bg-card  p-5">
                <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-4">目标数据</h2>
                <div id="objectiveStats-${platform}" class="grid grid-cols-2 gap-3 text-sm"></div>
              </div>
            </div>
          </div>
          <!-- 赛季 -->
          <div id="tab-season-${platform}" class="tab-panel hidden">
            <div class="bg-card  p-5 mb-8" id="seasonSection-${platform}" style="display:none">
              <div class="flex items-baseline justify-between mb-4">
                <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wider">赛季历史</h2>
                <p id="seasonTime-${platform}" class="text-xs text-gray-600"></p>
              </div>
              <div id="seasonChart-${platform}" class="chart-box-lg"></div>
            </div>
          </div>
        </div>

        <!-- 个人记录 -->
        <div class="bg-card  p-5 mb-8" id="recordSection-${platform}" style="display:none">
          <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-4">个人记录</h2>
          <div id="recordCards-${platform}" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3"></div>
        </div>

        <!-- BF6 赛季数据 -->
        <div class="bg-card  p-5 mb-8" id="seasonStatsSection" style="display:none">
          <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-4">赛季数据详情</h2>
          <div id="seasonStatsContent"></div>
        </div>

        <!-- BF2042 名片 -->
        <div class="bg-card  p-5 mb-8" id="inventorySection" style="display:none">
          <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-4">玩家名片</h2>
          <div id="inventoryContent"></div>
        </div>
      `;

      // ── 数据填充（武器/载具/地图/模式/兵种/记录/赛季/贡献）──
      renderWeaponTop10(allData, platform);
      renderVehicleTop10(allData, platform);
      renderKillTypeChart(stats, platform);
      renderClassSection(allData, platform);
      renderPersonalRecords(stats, platform);
      renderSeasonHistory(allData, platform);
      renderGameModes(allData, platform);
      renderMaps(allData, platform);
      renderSupportSection(stats, platform);
    }

    // ═══════════════════════════════════════════════════════
    // renderPlatformContent 的数据填充辅助函数
    // ═══════════════════════════════════════════════════════

    // ── 武器 Top10 渲染（统一响应式）──
    function renderWeaponTop10(allData, platform) {
      if (!allData?.weapons?.length) return;
      const top10 = [...allData.weapons].filter(w => w.kills > 0).sort((a, b) => b.kills - a.kills).slice(0, 10);
      if (!top10.length) return;
      document.getElementById(`killsSection-${platform}`).style.display = '';
      document.getElementById(`weaponPanel-${platform}`).style.display = '';
      document.getElementById(`weaponContent-${platform}`).innerHTML = top10.map((w, i) => {
        const pct = Math.round((w.kills / top10[0].kills) * 100);
        const img = w.image ? `<img loading="lazy" src="${w.image}" class="w-8 h-8 lg:w-10 lg:h-10 object-contain shrink-0" alt="">` : `<span class="w-8 h-8 lg:w-10 lg:h-10 flex items-center justify-center text-xs font-bold text-gray-500 bg-gray-700/50 rounded shrink-0">${(w.weaponName||'?')[0]}</span>`;
        return `<div class="flex items-start gap-3 bg-dark px-3 py-2 mb-2 hover-lift">
          <span class="hidden lg:inline text-xs text-gray-500 w-5 text-right shrink-0 pt-1">${i+1}</span>
          <div class="w-8 h-8 lg:w-12 lg:h-12 rounded bg-gray-700/30 flex items-center justify-center shrink-0 overflow-hidden">${img}</div>
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2">
              <span class="flex-1 lg:flex-none lg:w-24 text-sm lg:text-xs text-gray-200 lg:text-gray-300 truncate shrink-0">${w.weaponName}</span>
              <div class="hidden lg:block flex-1 bg-gray-700/50 rounded-full h-3 overflow-hidden"><div class="h-full rounded-full" style="width:${pct}%;background:linear-gradient(90deg,#3b82f6,#8b5cf6)"></div></div>
              <span class="text-sm lg:text-xs font-bold text-accent lg:text-white w-auto lg:w-12 text-right shrink-0">${formatNum(w.kills)}</span>
            </div>
            <div style="font-size:10px;margin-top:4px;display:flex;gap:18px"><div style="color:#6b7280">总伤害<div style="color:#d1d5db;font-size:11px">${formatNum(Math.round(w.damage))}</div></div><div style="color:#6b7280">命中率<div style="color:#d1d5db;font-size:11px">${formatPct(w.accuracy)}</div></div><div style="color:#6b7280">爆头率<div style="color:#d1d5db;font-size:11px">${formatPct(w.headshots)}</div></div><div style="color:#6b7280">时长<div style="color:#d1d5db;font-size:11px">${w.timeEquipped ? formatSeconds(w.timeEquipped) : '—'}</div></div></div>
          </div>
        </div>`;
      }).join('');
    }

    // ── 载具 Top10 渲染（统一响应式）──
    function renderVehicleTop10(allData, platform) {
      if (!allData?.vehicles?.length) return;
      const topV = [...allData.vehicles].filter(v => v.kills > 0).sort((a, b) => b.kills - a.kills).slice(0, 10);
      if (!topV.length) return;
      document.getElementById(`killsSection-${platform}`).style.display = '';
      document.getElementById(`vehiclePanel-${platform}`).style.display = '';
      document.getElementById(`vehicleContent-${platform}`).innerHTML = topV.map((v, i) => {
        const pct = Math.round((v.kills / topV[0].kills) * 100);
        const img = v.image ? `<img loading="lazy" src="${v.image}" class="w-8 h-8 lg:w-10 lg:h-10 object-contain shrink-0" alt="">` : `<span class="w-8 h-8 lg:w-10 lg:h-10 flex items-center justify-center text-xs font-bold text-gray-500 bg-gray-700/50 rounded shrink-0">${(v.vehicleName||'?')[0]}</span>`;
        return `<div class="flex items-start gap-3 bg-dark px-3 py-2 mb-2 hover-lift">
          <span class="hidden lg:inline text-xs text-gray-500 w-5 text-right shrink-0 pt-1">${i+1}</span>
          <div class="w-8 h-8 lg:w-12 lg:h-12 rounded bg-gray-700/30 flex items-center justify-center shrink-0 overflow-hidden">${img}</div>
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2">
              <span class="flex-1 lg:flex-none lg:w-24 text-sm lg:text-xs text-gray-200 lg:text-gray-300 truncate shrink-0">${v.vehicleName}</span>
              <div class="hidden lg:block flex-1 bg-gray-700/50 rounded-full h-3 overflow-hidden"><div class="h-full rounded-full" style="width:${pct}%;background:linear-gradient(90deg,#3b82f6,#8b5cf6)"></div></div>
              <span class="text-sm lg:text-xs font-bold text-accent lg:text-white w-auto lg:w-12 text-right shrink-0">${formatNum(v.kills)}</span>
            </div>
            <div style="font-size:10px;margin-top:4px;display:flex;gap:18px"><div style="color:#6b7280">总伤害<div style="color:#d1d5db;font-size:11px">${formatNum(Math.round(v.damage||0))}</div></div><div style="color:#6b7280">摧毁载具<div style="color:#d1d5db;font-size:11px">${formatNum(v.destroyed)}</div></div><div style="color:#6b7280">路杀<div style="color:#d1d5db;font-size:11px">${formatNum(v.roadKills||0)}</div></div><div style="color:#6b7280">时长<div style="color:#d1d5db;font-size:11px">${(v.timeIn||v.secondsPlayed) ? formatSeconds(v.timeIn||v.secondsPlayed) : '—'}</div></div></div>
          </div>
        </div>`;
      }).join('');
    }

    // ── 击杀类型雷达图 ──
    function renderKillTypeChart(stats, platform) {
      const dk = stats.dividedKills || {};
      const killTypes = [
        { name: '步兵击杀', value: dk.human || 0 },
        { name: '载具击杀', value: dk.vehicle || 0 },
        { name: '远距离',   value: dk.longDistance || 0 },
        { name: '手雷',     value: dk.grenades || 0 },
        { name: '近战',     value: dk.melee || 0 },
        { name: '路杀',     value: dk.roadkills || 0 },
        { name: '降落伞',   value: dk.parachute || 0 },
        { name: '多杀',     value: dk.multiKills || 0 },
        { name: '乘客击杀', value: dk.passenger || 0 },
      ].filter(x => x.value > 0);
      if (killTypes.length) renderRadarChart(document.getElementById(`killTypeChart-${platform}`), killTypes);
    }

    // ── 兵种数据 ──
    function renderClassSection(allData, platform) {
      const classes = (allData?.classes || []).filter(c => c.className !== 'All' && c.kills > 0);
      if (classes.length) {
        document.getElementById(`classSection-${platform}`).style.display = '';
        document.getElementById(`classCards-${platform}`).innerHTML = classes.map(c => {
          const spmVal = c.score && c.secondsPlayed ? (c.score / (c.secondsPlayed / 60)).toFixed(0) : '—';
          return `
            <div class="bg-dark p-4 hover-lift">
              <div class="flex items-center gap-3 mb-3">
                ${c.image ? `<img loading="lazy" src="${c.image}" class="w-8 h-8 opacity-80" alt="${c.className}">` : ''}
                <div>
                  <p class="text-sm font-semibold text-white">${CLASS_CN[c.className] || c.className}</p>
                  <p class="text-xs text-gray-500">${formatSeconds(c.secondsPlayed)}</p>
                </div>
              </div>
              <div class="grid grid-cols-2 gap-x-2 sm:gap-x-4 gap-y-2 text-sm">
                <div><p class="font-bold" style="color:${kdColor(c.killDeath)}">${formatDecimal(c.killDeath)}</p><p class="text-xs text-gray-500">K/D</p></div>
                <div><p class="font-bold text-white">${formatDecimal(c.kpm)}</p><p class="text-xs text-gray-500">KPM</p></div>
                <div><p class="font-bold text-white">${formatNum(c.kills)}</p><p class="text-xs text-gray-500">击杀</p></div>
                <div><p class="font-bold text-white">${formatNum(c.assists)}</p><p class="text-xs text-gray-500">助攻</p></div>
                <div><p class="font-bold text-white">${formatNum(c.spawns)}</p><p class="text-xs text-gray-500">出生次数</p></div>
                <div><p class="font-bold text-white">${spmVal}</p><p class="text-xs text-gray-500">SPM</p></div>
              </div>
            </div>`;
        }).join('');
        renderRadarChart(document.getElementById(`classChart-${platform}`), classes.map(c => ({ name: CLASS_CN[c.className] || c.className, value: c.kills })));
      } else {
        document.getElementById(`classChart-${platform}`).innerHTML = '<p class="text-gray-600 text-sm text-center pt-10">暂无兵种数据</p>';
      }
    }

    // ── 个人记录 ──
    function renderPersonalRecords(stats, platform) {
      const recordDefs = [
        { label: '最远爆头距离', value: stats.longestHeadShot != null ? formatNum(Math.round(stats.longestHeadShot)) + ' m' : null },
        { label: '最高连杀',     value: stats.highestKillStreak != null ? formatNum(stats.highestKillStreak) : null },
        { label: '夺取狗牌',     value: stats.dogtagsTaken != null ? formatNum(stats.dogtagsTaken) : null },
        { label: '最高得分/局',  value: stats.highestScore != null ? formatNum(stats.highestScore) : null },
        { label: '最高K/D局',    value: stats.bestGame?.kills != null ? formatNum(stats.bestGame.kills) + '杀' : null },
        { label: '最高伤害/局',  value: stats.highestDamageDealt != null ? formatNum(Math.round(stats.highestDamageDealt)) : null },
        { label: '最远击杀',     value: stats.longestKillStreak != null ? formatNum(Math.round(stats.longestKillStreak)) + ' m' : null },
        { label: '连杀纪录',     value: stats.highestKillSteakGame != null ? formatNum(stats.highestKillSteakGame) : null },
      ].filter(r => r.value != null);
      if (recordDefs.length) {
        document.getElementById(`recordSection-${platform}`).style.display = '';
        document.getElementById(`recordCards-${platform}`).innerHTML = recordDefs.map(r => `
          <div class="bg-dark p-4 hover-lift">
            <p class="text-lg font-bold text-accent">${r.value}</p>
            <p class="text-xs text-gray-500 mt-1">${r.label}</p>
          </div>`).join('');
      }
    }

    // ── 赛季历史 ──
    function renderSeasonHistory(allData, platform) {
      const seasons = Array.isArray(allData?.seasons) ? allData.seasons : [];
      if (seasons.length <= 1) return;
      const fmtDt = ts => { const d = new Date(ts*1000); return `${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getDate().toString().padStart(2,'0')}`; };
      // 每个赛季汇总所有模式的数据
      const seasonSummary = seasons.map(s => {
        const all = s.modes || [];
        const kills   = all.reduce((a, m) => a + (m.kills || 0), 0);
        const deaths  = all.reduce((a, m) => a + (m.deaths || 0), 0);
        const wins    = all.reduce((a, m) => a + (m.wins || 0), 0);
        const matches = all.reduce((a, m) => a + (m.matches || 0), 0);
        return {
          season: s.season,

          kd:     deaths ? (kills / deaths) : 0,
          wins,
          matches,
          winRate: matches ? (wins / matches * 100) : 0,
          kills,
        };
      });
      document.getElementById(`seasonSection-${platform}`).style.display = '';
      requestAnimationFrame(() => {
        const chart = echarts.init(document.getElementById(`seasonChart-${platform}`), 'dark');
        chart.setOption({
          backgroundColor: 'transparent',
          legend: { data: ['K/D', '胜率(%)'], textStyle: { color: '#9ca3af' }, top: 0 },
          grid: { left: 45, right: 55, top: 40, bottom: 40 },
          xAxis: { type: 'category', data: seasonSummary.map(s => s.season), axisLabel: { color: '#6b7280', fontSize: 10 }, splitLine: { show: false } },
          yAxis: [
            { type: 'value', name: 'K/D', nameTextStyle: { color: '#6b7280', fontSize: 10 }, axisLabel: { color: '#6b7280', fontSize: 10 }, splitLine: { lineStyle: { color: '#374151' } } },
            { type: 'value', name: '胜率%', nameTextStyle: { color: '#6b7280', fontSize: 10 }, position: 'right', axisLabel: { color: '#6b7280', fontSize: 10, formatter: '{value}%' }, splitLine: { show: false } },
          ],
          tooltip: {
            trigger: 'axis', backgroundColor: '#242933', borderColor: '#374151', textStyle: { color: '#f3f4f6' },
            formatter: params => {
              const s = seasonSummary[params[0].dataIndex];
              let tip = `${s.season}`;
              tip += `<br/>${params.map(p => `${p.marker}${p.seriesName}: <b>${p.value}</b>${p.seriesName === '胜率(%)' ? '%' : ''}`).join('<br/>')}<br/>场次: ${s.matches}  击杀: ${s.kills}`;
              return tip;
            },
          },
          series: [
            { name: 'K/D',    yAxisIndex: 0, type: 'line', smooth: true, data: seasonSummary.map(s => s.kd.toFixed(2)),       lineStyle: { color: '#3b82f6' }, itemStyle: { color: '#3b82f6' }, symbol: 'circle', symbolSize: 6 },
            { name: '胜率(%)', yAxisIndex: 1, type: 'line', smooth: true, data: seasonSummary.map(s => s.winRate.toFixed(1)), lineStyle: { color: '#22c55e' }, itemStyle: { color: '#22c55e' }, symbol: 'circle', symbolSize: 6 },
          ],
        });
        window.addEventListener('resize', () => chart.resize());
      });
      // 赛季汇总卡片
      const seasonCards = document.createElement('div');
      seasonCards.className = 'grid grid-cols-2 sm:grid-cols-4 gap-3 mt-4';
      seasonCards.innerHTML = seasonSummary.map(s => `
        <div class="bg-dark p-4 hover-lift">
          <p class="text-xs text-gray-500 mb-1">${s.season}</p>
          <div class="grid grid-cols-2 gap-x-3 gap-y-1 text-sm">
            <div><p class="font-bold text-white">${s.kills}</p><p class="text-xs text-gray-500">击杀</p></div>
            <div><p class="font-bold text-white">${formatDecimal(s.kd)}</p><p class="text-xs text-gray-500">K/D</p></div>
            <div><p class="font-bold text-white">${s.wins}</p><p class="text-xs text-gray-500">胜场</p></div>
            <div><p class="font-bold text-white">${s.winRate.toFixed(1)}%</p><p class="text-xs text-gray-500">胜率</p></div>
          </div>
        </div>
      `).join('');
      document.getElementById(`seasonChart-${platform}`).parentElement.appendChild(seasonCards);
      // 异步获取当前赛季时间并显示在顶部
      fetch('https://api.gametools.network/bf6/gameevents/').then(r=>r.json()).then(d => {
        const el = document.getElementById(`seasonTime-${platform}`);
        if (!el) return;
        const fmtDt = ts => { const d2 = new Date(ts*1000); return `${(d2.getMonth()+1).toString().padStart(2,'0')}/${d2.getDate().toString().padStart(2,'0')}`; };
        (d.events||[]).forEach(e => {
          if (!/^Season\d+$/.test(e.name)) return;
          const st = e.validUntil?.start?.value;
          const en = e.validUntil?.end?.value;
          if (st && en) {
            el.textContent = `${e.name.replace('Season', 'S')}: ${fmtDt(st)} ~ ${fmtDt(en)}`;
          }
        });
      }).catch(() => {});
    }

    // ── 游戏模式胜率（统一响应式）──
    function renderGameModes(allData, platform) {
      const gameModes = (allData?.gameModes || allData?.gamemodes || [])
        .filter(m => m.matches > 0 && m.gamemodeName !== 'Official')
        .sort((a, b) => (parseFloat(b.winPercent) || 0) - (parseFloat(a.winPercent) || 0));
      if (!gameModes.length) return;
      document.getElementById(`winRateSection-${platform}`).style.display = '';
      document.getElementById(`modeSection-${platform}`).style.display = '';
      document.getElementById(`modeContent-${platform}`).innerHTML = gameModes.map((m, i) => {
        const pct = Math.max(0, parseFloat(m.winPercent) || 0);
        const color = pct >= 50 ? '#22c55e' : pct >= 40 ? '#facc15' : '#f87171';
        const img = m.image ? `<img loading="lazy" src="${m.image}" class="w-8 h-8 lg:w-10 lg:h-10 object-contain shrink-0" alt="">` : `<span class="w-8 h-8 lg:w-10 lg:h-10 flex items-center justify-center text-xs font-bold text-gray-500 bg-gray-700/50 rounded shrink-0">M</span>`;
        return `<div class="flex items-start gap-3 bg-dark px-3 py-2 mb-2 hover-lift">
          <span class="hidden lg:inline text-xs text-gray-500 w-5 text-right shrink-0 pt-1">${i+1}</span>
          <div class="w-8 h-8 lg:w-12 lg:h-12 rounded bg-gray-700/30 flex items-center justify-center shrink-0 overflow-hidden">${img}</div>
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2">
              <span class="flex-1 lg:flex-none lg:w-24 text-sm lg:text-xs text-gray-200 lg:text-gray-300 truncate shrink-0">${getModeName(m.gamemodeName)}</span>
              <div class="hidden lg:block flex-1 bg-gray-700/50 rounded-full h-3 overflow-hidden"><div class="h-full rounded-full" style="width:${pct}%;background:${color}"></div></div>
              <span class="text-sm lg:text-xs font-bold w-auto lg:w-12 text-right shrink-0" style="color:${color}">${pct.toFixed(1)}%</span>
            </div>
            <div style="font-size:10px;margin-top:4px;display:flex;gap:18px"><div style="color:#6b7280">总场次<div style="color:#d1d5db;font-size:11px">${m.matches}</div></div><div style="color:#6b7280">胜场<div style="color:#d1d5db;font-size:11px">${formatNum(m.wins)}</div></div><div style="color:#6b7280">负场<div style="color:#d1d5db;font-size:11px">${formatNum(m.losses)}</div></div><div style="color:#6b7280">时长<div style="color:#d1d5db;font-size:11px">${formatSeconds(m.secondsPlayed)}</div></div></div>
          </div>
        </div>`;
      }).join('');
    }

    // ── 地图胜率（统一响应式）──
    function renderMaps(allData, platform) {
      const maps = (allData?.maps || []).filter(m => m.mapName !== 'All' && m.matches > 0)
        .sort((a, b) => (parseFloat(b.winPercent) || 0) - (parseFloat(a.winPercent) || 0)).slice(0, 15);
      if (!maps.length) return;
      document.getElementById(`winRateSection-${platform}`).style.display = '';
      document.getElementById(`mapSection-${platform}`).style.display = '';
      document.getElementById(`mapContent-${platform}`).innerHTML = maps.map((m, i) => {
        const pct = Math.max(0, parseFloat(m.winPercent) || 0);
        const color = pct >= 50 ? '#22c55e' : pct >= 40 ? '#facc15' : '#f87171';
        const img = m.image ? `<img loading="lazy" src="${m.image}" class="w-8 h-8 lg:w-10 lg:h-10 object-cover rounded shrink-0" alt="">` : `<span class="w-8 h-8 lg:w-10 lg:h-10 flex items-center justify-center text-xs font-bold text-gray-500 bg-gray-700/50 rounded shrink-0">${(MAP_CN[m.mapName]||m.mapName||'?')[0]}</span>`;
        return `<div class="flex items-start gap-3 bg-dark px-3 py-2 mb-2 hover-lift">
          <span class="hidden lg:inline text-xs text-gray-500 w-5 text-right shrink-0 pt-1">${i+1}</span>
          <div class="w-8 h-8 lg:w-12 lg:h-12 rounded bg-gray-700/30 flex items-center justify-center shrink-0 overflow-hidden">${img}</div>
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2">
              <span class="flex-1 lg:flex-none lg:w-24 text-sm lg:text-xs text-gray-200 lg:text-gray-300 truncate shrink-0">${MAP_CN[m.mapName] || m.mapName}</span>
              <div class="hidden lg:block flex-1 bg-gray-700/50 rounded-full h-3 overflow-hidden"><div class="h-full rounded-full" style="width:${pct}%;background:${color}"></div></div>
              <span class="text-sm lg:text-xs font-bold w-auto lg:w-12 text-right shrink-0" style="color:${color}">${pct.toFixed(1)}%</span>
            </div>
            <div style="font-size:10px;margin-top:4px;display:flex;gap:18px"><div style="color:#6b7280">总场次<div style="color:#d1d5db;font-size:11px">${m.matches}</div></div><div style="color:#6b7280">胜场<div style="color:#d1d5db;font-size:11px">${formatNum(m.wins)}</div></div><div style="color:#6b7280">负场<div style="color:#d1d5db;font-size:11px">${formatNum(m.losses)}</div></div><div style="color:#6b7280">时长<div style="color:#d1d5db;font-size:11px">${formatSeconds(m.secondsPlayed)}</div></div></div>
          </div>
        </div>`;
      }).join('');
    }

    // ── 支援与目标数据 ──
    function renderSupportSection(stats, platform) {
      function statCell(label, value) {
        return `<div class="bg-dark p-3 hover-lift">
          <p class="text-base font-bold text-white">${value}</p>
          <p class="text-xs text-gray-500 mt-0.5">${label}</p>
        </div>`;
      }
      const obj = stats.objective || {};
      const supportItems = [
        ['救援击杀', formatNum(stats.saviorKills)],
        ['助攻',     formatNum(stats.killAssists)],
        ['侦察',     formatNum(stats.enemiesSpotted)],
        ['复活',     formatNum(stats.revives)],
        ['队友复活', formatNum(stats.squadmateRevive)],
        ['治疗',     formatNum(stats.heals)],
        ['补给',     formatNum(stats.resupplies)],
        ['修理',     formatNum(stats.repairs)],
        ['摧毁载具', formatNum(stats.vehiclesDestroyed)],
        ['摧毁配备', formatNum(stats.gadgetsDestroyed ?? stats.gadgetsDestoyed)],
      ].filter(([, v]) => v !== '-' && v !== '0' && v !== formatNum(0));
      const objectiveItems = [
        ['占点数',   formatNum(obj.captured)],
        ['中立化',   formatNum(obj.neutralized)],
        ['防守次数', formatNum(obj.defended ?? obj.time?.defended)],
        ['安弹次数', formatNum(obj.armed)],
        ['拆弹次数', formatNum(obj.defused)],
        ['摧毁目标', formatNum(obj.destroyed)],
        ['目标时间', formatSeconds(obj.time?.total)],
      ].filter(([, v]) => v !== '-' && v !== '0' && v !== formatNum(0));
      if (supportItems.length || objectiveItems.length) {
        document.getElementById(`supportSection-${platform}`).style.display = '';
        document.getElementById(`supportStats-${platform}`).innerHTML    = supportItems.map(([l, v]) => statCell(l, v)).join('');
        document.getElementById(`objectiveStats-${platform}`).innerHTML  = objectiveItems.map(([l, v]) => statCell(l, v)).join('') || '<p class="text-gray-600 text-sm col-span-2 pt-4">暂无目标数据</p>';
      }
    }

    // ─── 主加载逻辑 ──────────────────────────────────────────
    async function load() {
      if (!name) {
        document.getElementById('loadingState').classList.add('hidden');
        document.getElementById('errorState').classList.remove('hidden');
        document.getElementById('errorTitle').textContent = '请输入玩家用户名';
        document.getElementById('errorMsg').textContent   = '';
        document.getElementById('errorTips').style.display = 'none';
        return;
      }

      const BASE      = 'https://api.gametools.network';

      // 直接使用请求的平台（默认 xbox）
      const urlParams = new URLSearchParams(window.location.search);
      const platform = urlParams.get('platform') || 'xbox';

      // 单次查询
      let stats, allData, profileData;
      try {
        [stats, allData, profileData] = await Promise.all([
          getStats(game, name, platform),
          fetch(`${BASE}/${game}/all/?name=${encodeURIComponent(name)}&platform=${platform}`, { signal: AbortSignal.timeout?.(15000) })
            .then(r => r.json()).catch(() => null),
          fetch(`${BASE}/${game}/profile/?name=${encodeURIComponent(name)}&platform=${platform}`, { signal: AbortSignal.timeout?.(10000) })
            .then(r => r.json()).catch(() => null),
        ]);
      } catch (e) {
        let errMsg = e?.message || 'NOTFOUND';
        if (errMsg === 'TIMEOUT') errMsg = '请求超时，请检查网络后重试';
        else if (errMsg === 'NETWORK') errMsg = '网络连接失败，请检查网络';
        else if (errMsg === 'NOTFOUND' || errMsg === 'NO_STATS') errMsg = '未找到该玩家，请检查用户名和平台';
        showError(errMsg);
        return;
      }

      if (!stats) {
        showError('未找到该玩家，请检查用户名和平台');
        return;
      }

      // 从 profile 补全等级信息（若子平台 profile 为空则尝试通用平台）
      let pf = profileData?.playerProfiles?.[0];
      if (!pf?.playerCard?.rank) {
        const pfFallback = { xboxone:'xbox', xboxseries:'xbox', ps4:'psn', ps5:'psn' }[platform];
        if (pfFallback) {
          try {
            const fbData = await fetch(`${BASE}/${game}/profile/?name=${encodeURIComponent(name)}&platform=${pfFallback}`, { signal: AbortSignal.timeout?.(8000) }).then(r => r.json()).catch(() => null);
            pf = fbData?.playerProfiles?.[0] || pf;
          } catch {}
        }
      }
      if (pf?.playerCard?.rank != null) {
        allData ??= {};
        allData.rank = allData.rank ?? pf.playerCard.rank;
        allData.rankName = allData.rankName ?? pf.rankName;
        allData.rankImage = allData.rankImage ?? pf.playerCard.rankImage;
      }

      if (allData) saveApiCache(game, platform, name, allData);

      const results = [{ platform, stats, allData, profileData }];

      // 保存搜索记录（用第一个结果的平台）
      saveSnapshot(game, results[0].platform, name, results[0].stats);
      saveRecentSearch(game, results[0].platform, name);

      // 填充玩家头部（用第一个结果）
      const first = results[0];

      // 缓存分享数据
      stats = first.stats;
      const allClass = first.allData?.classes?.find(c => c.id === 'kit') || first.allData?.classes?.[0];
      const humanKills = stats.dividedKills?.human || stats.kills || 0;
      const spmVal = (allClass?.score && allClass?.secondsPlayed)
        ? (allClass.score / (allClass.secondsPlayed / 60)).toFixed(2)
        : (stats.scorePerMinute != null ? parseFloat(stats.scorePerMinute).toFixed(2) : null);
      const mp = stats.matchesPlayed ?? ((stats.wins != null && stats.loses != null) ? stats.wins + stats.loses : null);
      const hp = stats.headshots;
      const hkr = humanKills / (stats.deaths || 1);
      const hkpm = mp ? (humanKills / mp).toFixed(2) : null;
      const dpm = mp ? ((allClass?.deaths ?? stats.deaths ?? 0) / mp).toFixed(2) : null;
      window.__shareData = {
        name: stats.userName || name,
        game: GAME_LABELS[game] || game,
        time: formatSeconds(stats.secondsPlayed),
        kd: formatDecimal(hkr),
        kdColor: kdColor(hkr),
        wr: formatPct(stats.winPercent),
        wrColor: winColor(parseFloat(stats.winPercent)),
        platform: first.platform,
        url: location.href,
        avatar: stats.avatar,
        kills: formatNum(humanKills),
        deaths: formatNum(stats.deaths),
        wins: formatNum(stats.wins),
        matches: formatNum(mp),
        spm: spmVal,
        headshots: formatPct(hp),
        accuracy: formatPct(stats.accuracy),
        kpm: formatDecimal(stats.killsPerMinute),
        killsPerMatch: hkpm,
        deathsPerMatch: dpm,
        headShots: formatNum(stats.headShots),
        assists: formatNum(allClass?.assists ?? stats.killAssists),
        revives: formatNum(stats.revives),
        rankValue: first.allData?.rank ?? '',
        rankName: first.allData?.rankName ?? '',
        // 偏好数据
        bestClass: (() => {
          const cs = (first.allData?.classes || []).filter(c => c.className !== 'All' && c.kills > 0);
          if (!cs.length) return '—';
          return cs.map(c => ({ ...c, score: ((c.kills || 0) / (c.deaths || 1)) * Math.sqrt(c.kills || 0) })).sort((a, b) => b.score - a.score)[0]?.className || '—';
        })(),
        bestWeapon: (() => {
          const ws = (first.allData?.weapons || []).filter(w => w.kills > 0).map(w => ({ ...w, score: (w.kills || 0) * Math.sqrt(w.killsPerMinute || 0.01) })).sort((a, b) => b.score - a.score);
          const best = ws[0]; return best?.name || best?.weaponName || '—';
        })(),
        favMap: (() => {
          const ms = (first.allData?.maps || []).filter(m => m.mapName !== 'All' && m.matches > 0).map(m => ({ ...m, score: (m.secondsPlayed || 0) * (parseFloat(m.winPercent || 50) / 50) })).sort((a, b) => b.score - a.score);
          return MAP_CN[ms[0]?.mapName] || ms[0]?.mapName || '—';
        })(),
        favMode: (() => {
          const gms = (first.allData?.gameModes || first.allData?.gamemodes || []).filter(m => m.matches > 0 && m.gamemodeName !== 'Official').map(m => ({ ...m, score: (m.secondsPlayed || 0) * (parseFloat(m.winPercent || 50) / 50) })).sort((a, b) => b.score - a.score);
          return getModeName(gms[0]?.gamemodeName) || '—';
        })(),
      };
      // 缓存板块数据供分享文本使用
      window.__shareOps = {
        weapons: (first.allData?.weapons || []).filter(w => w.kills > 0).sort((a, b) => b.kills - a.kills).slice(0, 5).map(w => ({ name: w.weaponName, kills: formatNum(w.kills) })),
        vehicles: (first.allData?.vehicles || []).filter(v => v.kills > 0).sort((a, b) => b.kills - a.kills).slice(0, 5).map(v => ({ name: v.vehicleName, kills: formatNum(v.kills) })),
        maps: (first.allData?.maps || []).filter(m => m.mapName !== 'All' && m.matches > 0).sort((a, b) => (parseFloat(b.winPercent) || 0) - (parseFloat(a.winPercent) || 0)).slice(0, 5).map(m => ({ name: MAP_CN[m.mapName] || m.mapName, wr: parseFloat(m.winPercent).toFixed(1) })),
        classes: (first.allData?.classes || []).filter(c => c.className !== 'All' && c.kills > 0).sort((a, b) => b.kills - a.kills).slice(0, 4).map(c => ({ name: CLASS_CN[c.className] || c.className, kills: formatNum(c.kills) })),
      };

      // ── BF6 赛季数据详情 ──
      if (game === 'bf6') {
        (async () => {
          try {
            const allSeasons = first.allData?.seasons || [];
            if (!allSeasons.length) return;
            const sec = document.getElementById('seasonStatsSection');
            const ct = document.getElementById('seasonStatsContent');
            if (!sec || !ct) return;
            // 获取赛季时间信息
            let timeMap = {};
            try {
              const ge = await fetch('https://api.gametools.network/bf6/gameevents/').then(r=>r.json());
              const fmtDt = ts => { const d = new Date(ts*1000); return `${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getDate().toString().padStart(2,'0')}`; };
              (ge.events||[]).forEach(e => {
                const sid = e.name.replace(/\s+/g, '');
                const st = e.validUntil?.start?.value;
                const en = e.validUntil?.end?.value;
                if (sid && st && en) timeMap[sid] = { start: fmtDt(st), end: fmtDt(en) };
              });
            } catch {}
            const seasonRows = allSeasons.map(s => {
              const all = s.modes || [];
              const kills   = all.reduce((a, m) => a + (m.kills || 0), 0);
              const deaths  = all.reduce((a, m) => a + (m.deaths || 0), 0);
              const wins    = all.reduce((a, m) => a + (m.wins || 0), 0);
              const matches = all.reduce((a, m) => a + (m.matches || 0), 0);
              const kd = deaths ? (kills / deaths) : 0;
              const wp = matches ? (wins / matches * 100) : 0;
              const sid = (s.seasonId || s.season || '').replace(/\s+/g, '');
              const tr = timeMap[sid];
              return {
                season: s.season,
                timeRange: tr ? `${tr.start} ~ ${tr.end}` : '—',
                kd, wp, kills, matches
              };
            });
            sec.style.display = '';
            ct.innerHTML = '<div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="border-b border-gray-700"><th class="text-left py-2 pr-4 text-gray-500 font-medium text-xs">赛季</th><th class="text-left py-2 pr-4 text-gray-500 font-medium text-xs">时间</th><th class="text-left py-2 pr-4 text-gray-500 font-medium text-xs">K/D</th><th class="text-left py-2 pr-4 text-gray-500 font-medium text-xs">胜率</th><th class="text-left py-2 pr-4 text-gray-500 font-medium text-xs">击杀</th><th class="text-left py-2 pr-4 text-gray-500 font-medium text-xs">场次</th></tr></thead><tbody>' +
              seasonRows.map(s => `<tr class="border-b border-gray-700/40 hover:bg-gray-800/30"><td class="py-2 pr-4 text-white font-medium">${s.season}</td><td class="py-2 pr-4 text-gray-400 text-xs">${s.timeRange}</td><td class="py-2 pr-4 text-gray-300">${formatDecimal(s.kd)}</td><td class="py-2 pr-4 text-gray-300">${formatPct(s.wp)}</td><td class="py-2 pr-4 text-gray-300">${formatNum(s.kills)}</td><td class="py-2 pr-4 text-gray-300">${formatNum(s.matches)}</td></tr>`).join('') + '</tbody></table></div>';
          } catch {}
        })();
      }

      // ── BF2042 玩家名片 ──
      if (game === 'bf2042') {
        (async () => {
          try {
            const inv = await getInventory('bf2042', name, results[0].platform).catch(() => null);
            if (!inv) return;
            const sec = document.getElementById('inventorySection');
            const ct = document.getElementById('inventoryContent');
            if (!sec || !ct) return;
            sec.style.display = '';
            const badges = inv.badges || inv.emblem || [];
            if (badges.length) {
              ct.innerHTML = '<div class="flex flex-wrap gap-2">' +
                badges.slice(0, 12).map(b => `<span class="bg-dark  px-3 py-1.5 text-xs text-gray-300 border border-gray-700">${b.name || b.id || '徽章'}</span>`).join('') +
                '</div>';
            } else {
              ct.innerHTML = '<p class="text-gray-500 text-xs">暂无名片数据</p>';
            }
          } catch {}
        })();
      }

      const tabPanel  = document.getElementById('tabPanel');

      // 直接渲染第一个结果（已移除平台切换功能）
      renderPlatformContent(tabPanel, first);

      document.getElementById('loadingState').classList.add('hidden');
      document.getElementById('content').classList.remove('hidden');
    }

    function showError(msg) {
      document.getElementById('loadingState').classList.add('hidden');
      document.getElementById('errorState').classList.remove('hidden');
      const isNotFound = /not found|player|NOTFOUND/i.test(msg);
      const isNoStats  = msg === 'NO_STATS';
      const isTimeout  = msg === 'TIMEOUT';
      const isNetwork  = msg === 'NETWORK';

      document.getElementById('errorTitle').textContent =
        isNoStats ? '暂无战绩数据' : isNotFound ? '未找到玩家' :
        isTimeout ? '请求超时'     : isNetwork  ? '网络连接失败' : '查询失败';

      document.getElementById('errorMsg').textContent =
        isNoStats  ? `找到了玩家 "${name}"，但该账号在 ${GAME_LABELS[game] || game} 中没有战绩记录` :
        isNotFound ? `在 ${GAME_LABELS[game] || game} 的所有平台中均未找到玩家 "${name}"` :
        isTimeout  ? '数据服务响应超时，请稍后重试' :
        isNetwork  ? '无法连接到数据服务，请检查网络后重试' : msg;

      document.getElementById('errorTips').innerHTML =
        isNoStats ? `
          <p class="text-gray-300 font-medium mb-3">可能的原因：</p>
          <p>· 该账号未购买或未玩过此游戏</p>
          <p>· 游戏数据尚未同步到统计服务</p>` :
        (isTimeout || isNetwork) ? `
          <p class="text-gray-300 font-medium mb-3">建议操作：</p>
          <p>· 检查网络连接是否正常</p>
          <p>· 刷新页面重新查询</p>
          <p>· 尝试切换网络环境（如 WiFi / 移动数据）</p>
          <p>· 数据服务可能暂时不稳定，稍后再试</p>` : `
          <p class="text-gray-300 font-medium mb-3">可能的原因：</p>
          <p>· 用户名拼写错误，注意大小写</p>
          <p>· 该玩家从未在此游戏中有过记录</p>
          <p>· 游戏服务器暂时不可用，稍后再试</p>`;
      document.getElementById('errorTips').style.display = '';
    }

    load().catch(err => {
      const loadingState = document.getElementById('loadingState');
      const errorState = document.getElementById('errorState');
      if (loadingState) loadingState.classList.add('hidden');
      if (errorState) {
        errorState.classList.remove('hidden');
        document.getElementById('errorTitle').textContent = '查询失败';
        document.getElementById('errorMsg').textContent = err?.message || '未知错误，请稍后重试';
        const tips = document.getElementById('errorTips');
        if (tips) tips.style.display = 'none';
      }
    });

    // ─── Tab切换功能 ───
    window._switchTab = (tab, platform) => {
      const nav = document.getElementById('tabNav-' + platform);
      if (nav) {
        nav.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        const btn = nav.querySelector('[data-tab="' + tab + '"]');
        if (btn) btn.classList.add('active');
      }
      const panels = document.querySelectorAll('#detailTabs-' + platform + ' .tab-panel');
      panels.forEach(p => p.classList.add('hidden'));
      const panel = document.getElementById('tab-' + tab + '-' + platform);
      if (panel) panel.classList.remove('hidden');
      // 切换tab后resize echarts实例
      setTimeout(() => {
        panel.querySelectorAll('[_echarts_instance_]').forEach(el => {
          const inst = echarts.getInstanceByDom(el);
          if (inst) inst.resize();
        });
      }, 50);
    };

    // ─── 分享功能（放在最后避免初始化顺序问题） ───

    window.doShareLink = async () => {
      const checks = document.querySelectorAll('#shareSections input[type=checkbox]:checked');
      const sections = [...checks].map(c => c.value);
      const d = window.__shareData || {};
      const ops = window.__shareOps || {};

      let text = `🎮 ${d.name} 的 ${d.game} 战绩\n`;
      text += `━━━━━━━━━━━━━━\n`;
      text += `⚔️ KD: ${d.kd} · 🏆 胜率: ${d.wr} · ⏱ ${d.time}\n`;
      
      if (sections.includes('weapons') && ops.weapons?.length) {
        text += `━━━ 武器Top5 ━━━\n`;
        ops.weapons.slice(0, 3).forEach(w => { text += `  ${w.name}: ${w.kills}杀\n`; });
      }
      if (sections.includes('vehicles') && ops.vehicles?.length) {
        text += `━━━ 载具Top5 ━━━\n`;
        ops.vehicles.slice(0, 3).forEach(v => { text += `  ${v.name}: ${v.kills}杀\n`; });
      }
      if (sections.includes('maps') && ops.maps?.length) {
        text += `━━━ 地图胜率 ━━━\n`;
        ops.maps.slice(0, 3).forEach(m => { text += `  ${m.name}: ${m.wr}%\n`; });
      }
      if (sections.includes('classes') && ops.classes?.length) {
        text += `━━━ 兵种分布 ━━━\n`;
        ops.classes.forEach(c => { text += `  ${c.name}: ${c.kills}杀\n`; });
      }
      text += `\n📊 查看完整数据 → ${d.url || location.href}`;

      try {
        if (navigator.share) {
          await navigator.share({ title: `${d.name} 的 ${d.game} 战绩`, text, url: d.url || location.href });
        } else {
          await navigator.clipboard.writeText(text);
          alert('已复制到剪贴板！');
        }
      } catch (err) {
        if (err?.name !== 'AbortError') {
          try {
            await navigator.clipboard.writeText(text);
            alert('已复制到剪贴板！');
          } catch {}
        }
      }
      window.closeShareModal();
    };

    // 海报生成中状态
    window.__posterLoading = false;

    window.doSharePoster = async () => {
      if (window.__posterLoading) return;
      window.__posterLoading = true;
      try {
        const d = window.__shareData || {};
        const ACCENT = '#FF4D5F', HIGHLIGHT = '#FFD21F';
        const W = 1080, H = 1350, P = 48;
        const fnt = (w, s, c) => `${w} ${s}px system-ui, -apple-system, sans-serif`;
        const CLASS_CN_MAP = { 'Assault':'突击兵','Engineer':'工程师','Support':'支援兵','Recon':'侦察兵','Commander':'指挥官','Specialist':'特种兵' };
        const bestClassCN = CLASS_CN_MAP[d.bestClass] || d.bestClass || '—';

        // 准备指标数据
        const stats = [
          ['每分钟得分', d.spm], ['爆头率', d.headshots], ['命中率', d.accuracy],
          ['KPM', d.kpm], ['场均击杀', d.killsPerMatch], ['场均死亡', d.deathsPerMatch],
          ['爆头数', d.headShots], ['助攻数', d.assists], ['急救数', d.revives],
        ].filter(s => s[1] != null && s[1] !== '—');

        const canvas = document.createElement('canvas');
        canvas.width = W; canvas.height = H;
        const ctx = canvas.getContext('2d');

        // ── 1. 背景：深色 + 渐变遮罩 ──
        ctx.fillStyle = '#0a0c10';
        ctx.fillRect(0, 0, W, H);
        // 径向渐变 - 营造战场氛围
        const grad = ctx.createRadialGradient(W/2, H*0.3, 100, W/2, H*0.3, W*0.7);
        grad.addColorStop(0, 'rgba(20,25,35,0.8)');
        grad.addColorStop(0.5, 'rgba(10,12,16,0.95)');
        grad.addColorStop(1, '#0a0c10');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);
        // 底部加深
        const bgGrad = ctx.createLinearGradient(0, H*0.7, 0, H);
        bgGrad.addColorStop(0, 'rgba(10,12,16,0)');
        bgGrad.addColorStop(1, 'rgba(0,0,0,0.6)');
        ctx.fillStyle = bgGrad;
        ctx.fillRect(0, H*0.7, W, H*0.3);

        // ── 2. 顶部红色强调线 ──
        ctx.fillStyle = ACCENT;
        ctx.fillRect(0, 0, W, 5);

        let y = 52;

        // ── 3. 顶部区域 ──
        ctx.fillStyle = '#ffffff';
        ctx.font = fnt('800', 42);
        ctx.fillText('BF Tracker', P, y + 42);
        y += 58;

        ctx.fillStyle = '#9ca3af';
        ctx.font = fnt('400', 22);
        ctx.fillText('我的战场数据一览', P, y + 22);
        y += 18;

        // 短红色横线
        ctx.fillStyle = ACCENT;
        ctx.fillRect(P, y, 60, 3);
        y += 28;

        ctx.fillStyle = '#6b7280';
        ctx.font = fnt('400', 18);
        ctx.fillText('精准记录每一场战斗，见证你的成长与荣耀！', P, y + 18);
        y += 52;

        // ── 4. 用户信息卡片 ──
        const cardH = 100;
        ctx.fillStyle = 'rgba(36,41,51,0.85)';
        ctx.beginPath(); ctx.roundRect(P, y, W - P * 2, cardH, 16); ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.06)';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.roundRect(P, y, W - P * 2, cardH, 16); ctx.stroke();

        // 左侧等级
        const lv = d.rankValue || 0;
        ctx.fillStyle = lv >= 250 ? ACCENT : '#60a5fa';
        ctx.font = fnt('800', 36);
        ctx.fillText('Lv.' + lv, P + 24, y + 62);

        // 中间：昵称 + 等级 + 时长
        ctx.fillStyle = '#ffffff';
        ctx.font = fnt('700', 32);
        ctx.fillText(d.name || '—', P + 160, y + 56);
        ctx.fillStyle = '#9ca3af';
        ctx.font = fnt('400', 18);
        ctx.fillText(d.rankName || ('Level ' + lv) + ' · ' + d.time, P + 160, y + 82);

        // 右侧：平台标签
        const pStr = d.platform || '';
        ctx.fillStyle = ACCENT;
        ctx.font = fnt('600', 20);
        ctx.fillText(pStr, W - P - 24 - ctx.measureText(pStr).width, y + 62);
        y += cardH + 32;

        // ── 5. 核心数据区 ──
        // 第一行：双卡片
        const gap = 20, cw = (W - P * 2 - gap) / 2, ch = 240;

        const drawCard = (x, val, lb, color, s1, s1l, s2, s2l) => {
          ctx.fillStyle = 'rgba(36,41,51,0.85)';
          ctx.beginPath(); ctx.roundRect(x, y, cw, ch, 16); ctx.fill();
          ctx.strokeStyle = 'rgba(255,255,255,0.06)';
          ctx.lineWidth = 1;
          ctx.beginPath(); ctx.roundRect(x, y, cw, ch, 16); ctx.stroke();
          // 大数字 - 核心数据用黄色高亮
          const txtColor = (lb === 'K/D' || lb === '胜率') ? HIGHLIGHT : color;
          ctx.fillStyle = txtColor;
          ctx.font = fnt('800', 86);
          ctx.fillText(val, x + 28, y + 100);
          ctx.fillStyle = '#6b7280';
          ctx.font = fnt('400', 22);
          ctx.fillText(lb, x + 28, y + 132);
          // 子数据
          const sx = x + 28, sx2 = x + cw / 2 + 4;
          ctx.fillStyle = '#f3f4f6'; ctx.font = fnt('700', 26);
          ctx.fillText(s1, sx, y + 182);
          ctx.fillText(s2, sx2, y + 182);
          ctx.fillStyle = '#6b7280'; ctx.font = fnt('400', 18);
          ctx.fillText(s1l, sx, y + 210);
          ctx.fillText(s2l, sx2, y + 210);
        };

        drawCard(P, d.kd, 'K/D', d.kdColor, d.kills, '击杀', d.deaths, '死亡');
        drawCard(P + cw + gap, d.wr, '胜率', d.wrColor, d.matches, '总场次', d.wins, '胜场');
        y += ch + 28;

        // 九宫格
        if (stats.length) {
          const COLS = 3, cg = 12, scw = (W - P * 2 - (COLS - 1) * cg) / COLS, sch = 90;
          for (let r = 0; r < 3; r++) {
            for (let c = 0; c < COLS; c++) {
              const i = r * COLS + c;
              if (i >= stats.length) break;
              const [lb, vl] = stats[i];
              const cx = P + c * (scw + cg), cy = y + r * (sch + cg);
              ctx.fillStyle = 'rgba(36,41,51,0.85)';
              ctx.beginPath(); ctx.roundRect(cx, cy, scw, sch, 14); ctx.fill();
              ctx.strokeStyle = 'rgba(255,255,255,0.06)';
              ctx.lineWidth = 1;
              ctx.beginPath(); ctx.roundRect(cx, cy, scw, sch, 14); ctx.stroke();
              ctx.fillStyle = '#f3f4f6'; ctx.font = fnt('700', 32);
              ctx.fillText(vl, cx + 18, cy + 50);
              ctx.fillStyle = '#6b7280'; ctx.font = fnt('400', 16);
              ctx.fillText(lb, cx + 18, cy + 76);
            }
          }
          y += 3 * (sch + cg) + 24;
        }

        // ── 6. 偏好数据区 ──
        ctx.fillStyle = '#6b7280';
        ctx.font = fnt('600', 18);
        ctx.fillText('战斗偏好', P, y + 18);
        y += 32;

        const prefs = [
          ['最擅长兵种', bestClassCN],
          ['最擅长武器', d.bestWeapon || '—'],
          ['最喜欢地图', d.favMap || '—'],
          ['最喜欢模式', d.favMode || '—'],
        ];
        const pgap = 12, pcw = (W - P * 2 - pgap * 3) / 4, pch = 76;
        prefs.forEach(([lb, vl], i) => {
          const cx = P + i * (pcw + pgap);
          ctx.fillStyle = 'rgba(36,41,51,0.85)';
          ctx.beginPath(); ctx.roundRect(cx, y, pcw, pch, 12); ctx.fill();
          ctx.strokeStyle = 'rgba(255,255,255,0.06)';
          ctx.lineWidth = 1;
          ctx.beginPath(); ctx.roundRect(cx, y, pcw, pch, 12); ctx.stroke();
          // 红色小图标 - 菱形
          ctx.fillStyle = ACCENT;
          ctx.fillRect(cx + 12, y + 14, 6, 6);
          ctx.fillStyle = '#f3f4f6'; ctx.font = fnt('600', 20);
          ctx.fillText(vl, cx + 28, y + 46);
          ctx.fillStyle = '#6b7280'; ctx.font = fnt('400', 14);
          ctx.fillText(lb, cx + 28, y + 66);
        });
        y += pch + 40;

        // ── 7. 底部品牌区 ──
        // 分隔线
        ctx.fillStyle = 'rgba(255,255,255,0.06)';
        ctx.fillRect(P, y, W - P * 2, 1);
        y += 32;

        const ftBase = H - 56;
        ctx.fillStyle = '#ffffff'; ctx.font = fnt('700', 30);
        ctx.fillText('BF Tracker', P, ftBase - 70);
        ctx.fillStyle = '#6b7280'; ctx.font = fnt('400', 18);
        ctx.fillText('mineonstudio.github.io/BFTracker', P, ftBase - 40);
        ctx.fillStyle = '#6b7280'; ctx.font = fnt('400', 16);
        ctx.fillText('Battlefield 6  ·  Powered by GameTools Network', P, ftBase - 14);

        // 右侧二维码
        const qr = 110;
        try {
          const qi = await new Promise((rs, rj) => {
            const im = new Image(); im.crossOrigin = 'anonymous';
            im.onload = () => rs(im); im.onerror = rj;
            im.src = 'https://api.qrserver.com/v1/create-qr-code/?size=' + qr + 'x' + qr + '&data=' + encodeURIComponent('https://mineonstudio.github.io/BFTracker/') + '&margin=2';
          });
          const qx = W - P - qr;
          const qy = ftBase - qr - 10;
          ctx.fillStyle = 'rgba(36,41,51,0.85)';
          ctx.beginPath(); ctx.roundRect(qx - 12, qy - 12, qr + 24, qr + 36, 12); ctx.fill();
          ctx.drawImage(qi, qx, qy, qr, qr);
          ctx.fillStyle = '#9ca3af'; ctx.font = fnt('400', 14);
          ctx.fillText('扫码查看我的详细数据', qx - 18, qy + qr + 24);
          // 红色箭头引导
          ctx.fillStyle = ACCENT;
          ctx.font = fnt('700', 16);
          ctx.fillText('→', qx + qr + 4, qy + qr / 2 + 6);
        } catch {}

        // 预览
        window.__posterCanvas = canvas;
        document.getElementById('posterPreviewImg').src = canvas.toDataURL('image/png');
        canvas.toBlob(blob => {
          window.__posterFile = new File([blob], 'bf-tracker-' + d.name + '.png', { type: 'image/png' });
        }, 'image/png');
        document.getElementById('posterPreviewModal').classList.remove('hidden');
      } catch (err) {
        console.error('海报生成失败:', err);
        alert('海报生成失败: ' + (err?.message || err));
      } finally {
        window.__posterLoading = false;
      }
    };
    
    window.closePosterPreview = () => {
      document.getElementById('posterPreviewModal')?.classList.add('hidden');
      window.__posterFile = null;
      window.__posterCanvas = null;
    };

    window.downloadPoster = async () => {
      const c = window.__posterCanvas;
      if (!c) return;
      const d = window.__shareData || {};
      // 优先尝试原生分享
      if (window.__posterFile && navigator.canShare?.({ files: [window.__posterFile] })) {
        try {
          await navigator.share({ files: [window.__posterFile], title: `${d.name} 的 ${d.game} 战绩` });
          return;
        } catch (err) { if (err?.name === 'AbortError') return; }
      }
      // 降级下载
      try {
        const a = document.createElement('a');
        a.download = `bf-tracker-${d.name}.png`;
        a.href = c.toDataURL();
        a.click();
      } catch {
        alert('图片含跨域资源无法直接下载，请右键海报选择「存储图像」');
      }
    };

    window.sharePoster = async () => {
      const file = window.__posterFile;
      if (file) {
        try {
          if (navigator.canShare?.({ files: [file] })) {
            await navigator.share({ files: [file], title: `${window.__shareData?.name} 的 ${window.__shareData?.game} 战绩` });
            return;
          }
        } catch (err) {
          if (err?.name !== 'AbortError') {}
        }
      }
      window.downloadPoster();
    };
  </script>
  </div>

  <!-- 页脚 -->
  <footer class="border-t border-gray-700">
    <div class="max-w-5xl mx-auto px-4 py-2 text-center">
      <p class="text-xs text-gray-600">&copy; 2026 BF Tracker &middot; Powered by GameTools Network</p>
    </div>
  </footer>

</body>
</html>
