    <div id="posterPreviewModal" class="hidden fixed inset-0 z-50 flex items-center justify-center" style="background:rgba(0,0,0,0.8)">

  <script type="module">
    import { getStats, GAME_LABELS, PLATFORM_LABELS, PLATFORM_CATEGORIES, searchPlayer, CATEGORY_PLATFORMS, GAME_CATEGORY_PLATFORMS } from './js/api.js';
    import { saveSnapshot, saveRecentSearch, saveApiCache } from './js/storage.js';
    import * as echarts from 'echarts/core';
    import { PieChart, BarChart, LineChart, RadarChart } from 'echarts/charts';
    import { LegendComponent, TooltipComponent, GridComponent } from 'echarts/components';
    import { CanvasRenderer } from 'echarts/renderers';
    echarts.use([PieChart, BarChart, LineChart, RadarChart, LegendComponent, TooltipComponent, GridComponent, CanvasRenderer]);
    import { checkBan, checkEacBan, getInventory } from './js/api.js';
    import { MAP_CN, getModeName, CLASS_CN } from './js/constants.js';
    import { formatNum, formatPct, formatDecimal, formatSeconds, kdColor, winColor, getUrlParams, buildPlayerUrl } from './js/utils.js';

    const gameSelect = document.getElementById('gameSelect');
    const nameInput  = document.getElementById('nameInput');
    const searchBtn  = document.getElementById('searchBtn');

    // 填充游戏下拉
    Object.entries(GAME_LABELS).forEach(([val, label]) => {
      gameSelect.innerHTML += `<option value="${val}">${label}</option>`;
    });

    // 填充平台下拉
    const platformCatEl = document.getElementById('platformSelect');
    if (platformCatEl) {
      PLATFORM_CATEGORIES.forEach(cat => {
        const opt = document.createElement('option');
        opt.value = cat;
        opt.textContent = cat;
        platformCatEl.appendChild(opt);
      });
    }

    // 从 URL 初始化
    const { game, name, platform: urlPlatform } = getUrlParams();
    gameSelect.value = game;
    nameInput.value  = name;
    // 设置平台分类（子平台映射到分类，默认 Xbox）
    if (platformCatEl) {
      const pLower = (urlPlatform || '').toLowerCase();
      if (pLower === 'steam' || pLower === 'ea' || pLower === 'epic' || pLower === 'pc') {
        platformCatEl.value = 'PC';
      } else if (pLower === 'xbox' || pLower === 'xboxone' || pLower === 'xboxseries') {
        platformCatEl.value = 'Xbox';
      } else if (pLower === 'psn' || pLower === 'ps4' || pLower === 'ps5' || pLower === 'playstation') {
        platformCatEl.value = 'PlayStation';
      } else {
        platformCatEl.value = 'Xbox';
      }
    }

    // 搜索
    function doSearch() {
      const n = nameInput.value.trim();
      if (!n) {
        nameInput.style.animation = 'none';
        nameInput.offsetHeight;
        nameInput.style.animation = 'shake 0.4s ease';
        nameInput.focus();
        return;
      }
      const pcat = document.getElementById('platformSelect')?.value || 'Xbox';
      window.location.href = `player.html?game=${encodeURIComponent(gameSelect.value)}&platform=${encodeURIComponent(pcat)}&name=${encodeURIComponent(n)}`;
    }
    searchBtn.addEventListener('click', doSearch);
    nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

    // ─── 图表渲染 ───────────────────────────────────────────
    function renderBarChart(el, labels, values, color = '#ff4655') {
      requestAnimationFrame(() => {
        const chart = echarts.init(el, 'dark');
        chart.setOption({
          backgroundColor: 'transparent',
          grid: { left: 10, right: 50, top: 10, bottom: 10, containLabel: true },
          xAxis: { type: 'value', axisLabel: { color: '#9ca3af', fontSize: 11 }, splitLine: { lineStyle: { color: '#374151' } } },
          yAxis: { type: 'category', data: labels, axisLabel: { color: '#d1d5db', fontSize: 11 }, axisTick: { show: false } },
          series: [{
            type: 'bar', data: values, barMaxWidth: 24,
            itemStyle: { color: { type: 'linear', x: 0, y: 0, x2: 1, y2: 0, colorStops: [{ offset: 0, color }, { offset: 1, color: '#fb923c' }] }, borderRadius: [0, 4, 4, 0] },
            label: { show: true, position: 'right', color: '#9ca3af', fontSize: 11 },
          }],
          tooltip: { trigger: 'axis', backgroundColor: '#242933', borderColor: '#374151', textStyle: { color: '#f3f4f6' } },
        });
        window.addEventListener('resize', () => chart.resize());
      });
    }

    function renderPieChart(el, items) {
      requestAnimationFrame(() => {
        const chart = echarts.init(el, 'dark');
        chart.setOption({
          backgroundColor: 'transparent',
          tooltip: { trigger: 'item', backgroundColor: '#242933', borderColor: '#374151', textStyle: { color: '#f3f4f6' } },
          legend: { orient: 'vertical', right: '5%', top: 'middle', textStyle: { color: '#9ca3af', fontSize: 11 } },
          series: [{
            type: 'pie', radius: ['38%', '65%'], center: ['38%', '50%'],
            data: items,
            label: { show: true, formatter: '{d}%', fontSize: 11, color: '#d1d5db' },
            labelLine: { lineStyle: { color: '#4b5563' } },
            emphasis: { itemStyle: { shadowBlur: 10, shadowColor: 'rgba(0,0,0,.5)' } },
          }],
        });
        window.addEventListener('resize', () => chart.resize());
      });
    }

    function renderRadarChart(el, items) {
      requestAnimationFrame(() => {
        const chart = echarts.init(el, 'dark');
        const maxVal = Math.max(...items.map(i => i.value), 1);
        chart.setOption({
          backgroundColor: 'transparent',
          radar: {
            indicator: items.map(i => ({ name: i.name, max: Math.ceil(maxVal * 1.3) })),
            center: ['50%', '52%'],
            radius: '68%',
            axisName: { color: '#9ca3af', fontSize: 11 },
            splitArea: { areaStyle: { color: ['rgba(255,70,85,0.04)', 'rgba(255,70,85,0.08)'] } },
            splitLine: { lineStyle: { color: '#374151' } },
            axisLine: { lineStyle: { color: '#374151' } },
          },
          series: [{
            type: 'radar',
            data: [{ value: items.map(i => i.value), name: '' }],
            areaStyle: { color: 'rgba(255,70,85,0.15)' },
            lineStyle: { color: '#ff4655', width: 2 },
            itemStyle: { color: '#ff4655' },
            symbol: 'circle',
            symbolSize: 3,
          }],
          tooltip: { trigger: 'item', backgroundColor: '#242933', borderColor: '#374151', textStyle: { color: '#f3f4f6' } },
        });
        window.addEventListener('resize', () => chart.resize());
      });
    }



    function renderPlatformContent(container, { stats, allData, platform }) {
      const BASE = 'https://api.gametools.network';

      // 计算衍生数据
      const allClass = allData?.classes?.find(c => c.id === 'kit') || allData?.classes?.[0];
      // SPM：优先从 classes 计算，其次用 stats.scorePerMinute 直接字段
      const spm = (allClass?.score && allClass?.secondsPlayed)
        ? (allClass.score / (allClass.secondsPlayed / 60)).toFixed(2)
        : (stats.scorePerMinute != null ? parseFloat(stats.scorePerMinute).toFixed(2) : null);
      // matchesPlayed：字段不存在时用 wins + loses 兜底
      const matchesPlayed = stats.matchesPlayed ?? ((stats.wins != null && stats.loses != null) ? stats.wins + stats.loses : null);
      const deathsPerMatch = matchesPlayed
        ? ((allClass?.deaths ?? stats.deaths ?? 0) / matchesPlayed).toFixed(2) : null;
      const assists    = allClass?.assists ?? stats.killAssists;
      const humanKills = stats.dividedKills?.human || stats.kills || 0;
      const humanKd    = stats.deaths ? (humanKills / stats.deaths) : 0;
      const humanKillsPerMatch = matchesPlayed ? (humanKills / matchesPlayed) : 0;

      container.innerHTML = `
        <!-- 玩家总览 -->
        <div class="bg-card rounded-2xl p-5 mb-8 fade-up">
          <!-- 玩家信息 -->
          <div class="flex items-end gap-3 mb-4">
            ${(() => { const p = platform?.toLowerCase() || ''; const key = p.includes('steam')?'steam':p.includes('ea')?'ea':p.includes('epic')?'epic':p.includes('xbox')?'xbox':p.includes('ps')||p.includes('playstation')?'playstation':null; const map = {steam:'steam',ea:'ea',epic:'epic',xbox:'xbox',playstation:'playstation'}; return key ? `<div class="w-14 h-14 sm:w-16 sm:h-16 rounded-full bg-gray-700/50 flex items-center justify-center shrink-0"><img loading="lazy" src="icons/${map[key]}.svg" class="w-8 h-8 sm:w-9 sm:h-9" alt=""></div>` : (stats.avatar && !stats.avatar.includes('default-avatar') ? `<img loading="lazy" src="${stats.avatar}" class="w-10 h-10 sm:w-12 sm:h-12 rounded-full bg-gray-700 object-cover" alt="">` : ''); })()}
            <div class="flex-1 min-w-0">
              <div class="flex justify-end">
                <span class="text-gray-400 text-xs sm:text-sm">${formatSeconds(stats.secondsPlayed)}</span>
              </div>
              <div class="flex items-center gap-2 mt-1">
                <h1 class="text-2xl sm:text-4xl font-black text-white tracking-tight truncate">${stats.userName || name}</h1>
                <div class="flex items-center gap-2 ml-auto shrink-0">
                  <span class="text-xs sm:text-sm font-semibold px-2 py-0.5 rounded-full bg-accent/10 h-6 flex items-center">${(GAME_LABELS[game] || game).replace('Battlefield ','BF')}</span>
                  <span id="banStatus"></span>
                  <button onclick="window.doSharePoster()" class="text-gray-400 hover:text-white transition-colors" title="分享"><svg class="w-4 h-4 sm:w-5 sm:h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg></button>
                </div>
              </div>
            </div>
          </div>
          <!-- 第一行：KD + 胜率 等宽 -->
          <div class="grid grid-cols-2 gap-4 mb-4">
            <div class="bg-dark rounded-xl p-4">
              <p class="text-2xl sm:text-4xl font-black" style="color:${kdColor(humanKd)}">${formatDecimal(humanKd)}</p>
              <p class="text-xs text-gray-500 mt-1">K/D</p>
              <div class="flex gap-4 mt-3 text-sm">
                <div><p class="text-white font-semibold">${formatNum(humanKills)}</p><p class="text-xs text-gray-500">击杀</p></div>
                <div><p class="text-white font-semibold">${formatNum(stats.deaths)}</p><p class="text-xs text-gray-500">死亡</p></div>
              </div>
            </div>
            <div class="bg-dark rounded-xl p-4 flex flex-col justify-between">
              <div>
                <p class="text-2xl sm:text-4xl font-black" style="color:${winColor(parseFloat(stats.winPercent))}">${formatPct(stats.winPercent)}</p>
                <p class="text-xs text-gray-500 mt-1">胜率</p>
              </div>
              <div class="flex gap-4 mt-3 text-sm">
                <div><p class="text-white font-semibold">${formatNum(matchesPlayed)}</p><p class="text-xs text-gray-500">总场次</p></div>
                <div><p class="text-white font-semibold">${formatNum(stats.wins)}</p><p class="text-xs text-gray-500">胜场</p></div>
              </div>
            </div>
          </div>
          <!-- 9 个指标：三行三列 -->
          <div class="grid grid-cols-3 gap-1.5 sm:gap-3">
            <div class="bg-dark rounded-xl p-2 sm:p-3"><p class="text-sm sm:text-lg font-bold text-white">${spm ?? '—'}</p><p class="text-xs text-gray-500">每分钟得分</p></div>
            <div class="bg-dark rounded-xl p-2 sm:p-3"><p class="text-sm sm:text-lg font-bold text-white">${formatPct(stats.headshots)}</p><p class="text-xs text-gray-500">爆头率</p></div>
            <div class="bg-dark rounded-xl p-2 sm:p-3"><p class="text-sm sm:text-lg font-bold text-white">${formatPct(stats.accuracy)}</p><p class="text-xs text-gray-500">命中率</p></div>
            <div class="bg-dark rounded-xl p-2 sm:p-3"><p class="text-sm sm:text-lg font-bold text-white">${formatDecimal(stats.killsPerMinute)}</p><p class="text-xs text-gray-500">KPM</p></div>
            <div class="bg-dark rounded-xl p-2 sm:p-3"><p class="text-sm sm:text-lg font-bold text-white">${formatDecimal(humanKillsPerMatch)}</p><p class="text-xs text-gray-500">场均击杀</p></div>
            <div class="bg-dark rounded-xl p-2 sm:p-3"><p class="text-sm sm:text-lg font-bold text-white">${deathsPerMatch ?? '—'}</p><p class="text-xs text-gray-500">场均死亡</p></div>
            <div class="bg-dark rounded-xl p-2 sm:p-3"><p class="text-sm sm:text-lg font-bold text-white">${formatNum(stats.headShots)}</p><p class="text-xs text-gray-500">爆头数</p></div>
            <div class="bg-dark rounded-xl p-2 sm:p-3"><p class="text-sm sm:text-lg font-bold text-white">${formatNum(assists)}</p><p class="text-xs text-gray-500">助攻数</p></div>
            <div class="bg-dark rounded-xl p-2 sm:p-3"><p class="text-sm sm:text-lg font-bold text-white">${formatNum(stats.revives)}</p><p class="text-xs text-gray-500">急救数</p></div>
          </div>
        </div>

        <!-- 查看更多 -->
        <div class="text-center mb-4" id="showMoreWrap-${platform}">
          <button id="showMoreBtn-${platform}" onclick="window._toggleDetailTabs('${platform}')" class="border border-gray-600 text-gray-400 hover:text-white hover:border-gray-500 px-6 py-2 rounded-lg text-sm transition-colors">查看更多 ▼</button>
        </div>

        <!-- Tab容器 -->
        <div id="detailTabs-${platform}" style="display:none" class="mb-8">
          <div class="flex gap-1 mb-4 border-b border-gray-700 justify-center" id="tabNav-${platform}">
            <button class="tab-btn active" data-tab="class" onclick="window._switchTab('class','${platform}')">兵种</button>
            <button class="tab-btn" data-tab="kills" onclick="window._switchTab('kills','${platform}')">击杀</button>
            <button class="tab-btn" data-tab="wins" onclick="window._switchTab('wins','${platform}')">胜率</button>
            <button class="tab-btn" data-tab="support" onclick="window._switchTab('support','${platform}')">贡献</button>
            <button class="tab-btn" data-tab="season" onclick="window._switchTab('season','${platform}')">赛季</button>
          </div>
          <!-- 兵种 -->
          <div id="tab-class-${platform}" class="tab-panel">
            <div class="bg-card rounded-2xl p-5 mb-8" id="classSection-${platform}" style="display:none">
              <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-4">兵种数据</h2>
              <div class="grid grid-cols-2 lg:grid-cols-4 gap-2 sm:gap-3" id="classCards-${platform}"></div>
            </div>
          </div>
          <!-- 击杀 -->
          <div id="tab-kills-${platform}" class="tab-panel hidden">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8" id="killsSection-${platform}">
              <div class="bg-card rounded-xl p-5" id="weaponPanel-${platform}" style="display:none">
                <div class="flex items-center justify-between mb-4">
                  <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wider">武器击杀排行</h2>
                </div>
                <div id="weaponChart-${platform}" class="block"></div>
                <div id="weaponList-${platform}" class="hidden"></div>
              </div>
              <div class="bg-card rounded-xl p-5" id="vehiclePanel-${platform}" style="display:none">
                <div class="flex items-center justify-between mb-4">
                  <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wider">载具击杀排行</h2>
                </div>
                <div id="vehicleChart-${platform}" class="block"></div>
                <div id="vehicleList-${platform}" class="hidden"></div>
              </div>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
              <div class="bg-card rounded-xl p-5">
                <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-4">击杀类型分布</h2>
                <div id="killTypeChart-${platform}" style="height:320px" class="w-full"></div>
              </div>
              <div class="bg-card rounded-xl p-5">
                <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-4">兵种击杀分布</h2>
                <div id="classChart-${platform}" style="height:320px" class="w-full"></div>
              </div>
            </div>
          </div>
          <!-- 胜率 -->
          <div id="tab-wins-${platform}" class="tab-panel hidden">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8" id="winRateSection-${platform}">
              <div class="bg-card rounded-xl p-5" id="mapSection-${platform}" style="display:none">
                <div class="flex items-center justify-between mb-4">

              <div class="bg-card rounded-xl p-5" id="modeSection-${platform}" style="display:none">
                <div class="flex items-center justify-between mb-4">
                  <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wider">游戏模式胜率</h2>

              </div>
              <div class="bg-card rounded-xl p-5">
                <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-4">目标数据</h2>

              <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-4">赛季历史</h2>

      // ── 数据填充（武器/载具/地图/模式/兵种/记录/赛季/贡献）──
      renderWeaponTop10(allData, platform);
      renderVehicleTop10(allData, platform);
      renderKillTypeChart(stats, platform);
      renderClassSection(allData, platform);
      renderPersonalRecords(stats, platform);
      renderSeasonHistory(allData, platform);
      renderGameModes(allData, platform);
      renderMaps(allData, platform);

    // ═══════════════════════════════════════════════════════
    // renderPlatformContent 的数据填充辅助函数
    // ═══════════════════════════════════════════════════════

    // ── 武器 Top10 渲染（桌面热力条 + 移动端列表）──
    function renderWeaponTop10(allData, platform) {
      if (!allData?.weapons?.length) return;
      const top10 = [...allData.weapons].filter(w => w.kills > 0).sort((a, b) => b.kills - a.kills).slice(0, 10);
      if (!top10.length) return;
      document.getElementById(`killsSection-${platform}`).style.display = '';
      document.getElementById(`weaponPanel-${platform}`).style.display = '';
      // 桌面端：热力条
      document.getElementById(`weaponChart-${platform}`).innerHTML = top10.map((w, i) => {
        const pct = Math.round((w.kills / top10[0].kills) * 100);
        const img = w.image ? `<img loading="lazy" src="${w.image}" class="w-10 h-10 object-contain shrink-0" alt="">` : `<span class="w-8 h-8 flex items-center justify-center text-xs font-bold text-gray-500 bg-gray-700/50 rounded shrink-0">${(w.weaponName||'?')[0]}</span>`;
        const sub = `总伤害 ${formatNum(Math.round(w.damage))} · 命中率 ${formatPct(w.accuracy)} · 爆头率 ${formatPct(w.headshots)} · 时长 ${w.timeEquipped ? formatSeconds(w.timeEquipped) : '—'}`;
        return `<div class="flex items-start gap-3 bg-dark rounded-lg px-3 py-2 mb-2"><span class="text-xs text-gray-500 w-5 text-right shrink-0 pt-1">${i+1}</span><div class="w-12 h-12 rounded bg-gray-700/30 flex items-center justify-center shrink-0 overflow-hidden">${img}</div><div class="flex-1 min-w-0"><div class="flex items-center gap-2"><span class="text-xs text-gray-300 w-24 truncate shrink-0">${w.weaponName}</span><div class="flex-1 bg-gray-700/50 rounded-full h-3 overflow-hidden"><div class="h-full rounded-full" style="width:${pct}%;background:linear-gradient(90deg,#ff4655,#fb923c)"></div></div><span class="text-xs font-bold text-white w-12 text-right shrink-0">${formatNum(w.kills)}</span></div><div style="font-size:10px;margin-top:4px;display:flex;gap:18px"><div style="color:#6b7280">总伤害<div style="color:#d1d5db;font-size:11px">${formatNum(Math.round(w.damage))}</div></div><div style="color:#6b7280">命中率<div style="color:#d1d5db;font-size:11px">${formatPct(w.accuracy)}</div></div><div style="color:#6b7280">爆头率<div style="color:#d1d5db;font-size:11px">${formatPct(w.headshots)}</div></div><div style="color:#6b7280">时长<div style="color:#d1d5db;font-size:11px">${w.timeEquipped ? formatSeconds(w.timeEquipped) : '—'}</div></div></div></div></div>`;
      }).join('');
      // 移动端：列表
      document.getElementById(`weaponList-${platform}`).innerHTML = top10.map((w, i) => `
        <div class="bg-dark rounded-lg px-3 py-2">
          <div class="flex items-center gap-3">
            ${w.image ? `<img loading="lazy" src="${w.image}" class="w-8 h-8 object-contain" alt="">` : `<span class="w-8 h-8 flex items-center justify-center text-xs font-bold text-gray-500 bg-gray-700/50 rounded">${(w.weaponName || '?')[0]}</span>`}
            <span class="text-sm text-gray-200 flex-1 truncate">${w.weaponName}</span>
            <span class="text-sm font-bold text-accent shrink-0">${formatNum(w.kills)}</span>
          </div>
          <div style="font-size:10px;margin-top:3px;padding-left:44px;display:flex;gap:18px"><div style="text-align:left"><div style="color:#6b7280">总伤害</div><div style="color:#d1d5db;font-size:11px">${formatNum(Math.round(w.damage))}</div></div><div style="text-align:left"><div style="color:#6b7280">命中率</div><div style="color:#d1d5db;font-size:11px">${formatPct(w.accuracy)}</div></div><div style="text-align:left"><div style="color:#6b7280">爆头率</div><div style="color:#d1d5db;font-size:11px">${formatPct(w.headshots)}</div></div><div style="text-align:left"><div style="color:#6b7280">时长</div><div style="color:#d1d5db;font-size:11px">${w.timeEquipped ? formatSeconds(w.timeEquipped) : '—'}</div></div></div>
        </div>`).join('');
    }

    // ── 载具 Top10 渲染（桌面热力条 + 移动端列表）──
    function renderVehicleTop10(allData, platform) {
      if (!allData?.vehicles?.length) return;
      const topV = [...allData.vehicles].filter(v => v.kills > 0).sort((a, b) => b.kills - a.kills).slice(0, 10);
      if (!topV.length) return;
      document.getElementById(`killsSection-${platform}`).style.display = '';
      document.getElementById(`vehiclePanel-${platform}`).style.display = '';
      // 桌面端：热力条
      document.getElementById(`vehicleChart-${platform}`).innerHTML = topV.map((v, i) => {
        const pct = Math.round((v.kills / topV[0].kills) * 100);
        const img = v.image ? `<img loading="lazy" src="${v.image}" class="w-10 h-10 object-contain shrink-0" alt="">` : `<span class="w-8 h-8 flex items-center justify-center text-xs font-bold text-gray-500 bg-gray-700/50 rounded shrink-0">${(v.vehicleName||'?')[0]}</span>`;
        const sub = `总伤害 ${formatNum(Math.round(v.damage||0))} · 摧毁载具 ${formatNum(v.destroyed)} · 路杀 ${formatNum(v.roadKills||0)} · 时长 ${(v.timeIn||v.secondsPlayed) ? formatSeconds(v.timeIn||v.secondsPlayed) : '—'}`;
        return `<div class="flex items-start gap-3 bg-dark rounded-lg px-3 py-2 mb-2"><span class="text-xs text-gray-500 w-5 text-right shrink-0 pt-1">${i+1}</span><div class="w-12 h-12 rounded bg-gray-700/30 flex items-center justify-center shrink-0 overflow-hidden">${img}</div><div class="flex-1 min-w-0"><div class="flex items-center gap-2"><span class="text-xs text-gray-300 w-24 truncate shrink-0">${v.vehicleName}</span><div class="flex-1 bg-gray-700/50 rounded-full h-3 overflow-hidden"><div class="h-full rounded-full" style="width:${pct}%;background:linear-gradient(90deg,#ff4655,#fb923c)"></div></div><span class="text-xs font-bold text-white w-12 text-right shrink-0">${formatNum(v.kills)}</span></div><div style="font-size:10px;margin-top:4px;display:flex;gap:18px"><div style="color:#6b7280">总伤害<div style="color:#d1d5db;font-size:11px">${formatNum(Math.round(v.damage||0))}</div></div><div style="color:#6b7280">摧毁载具<div style="color:#d1d5db;font-size:11px">${formatNum(v.destroyed)}</div></div><div style="color:#6b7280">路杀<div style="color:#d1d5db;font-size:11px">${formatNum(v.roadKills||0)}</div></div><div style="color:#6b7280">时长<div style="color:#d1d5db;font-size:11px">${(v.timeIn||v.secondsPlayed) ? formatSeconds(v.timeIn||v.secondsPlayed) : '—'}</div></div></div></div></div>`;
      }).join('');
      // 移动端：列表
      document.getElementById(`vehicleList-${platform}`).innerHTML = topV.map((v, i) => `
        <div class="bg-dark rounded-lg px-3 py-2">
          <div class="flex items-center gap-3">
            ${v.image ? `<img loading="lazy" src="${v.image}" class="w-8 h-8 object-contain" alt="">` : `<span class="w-8 h-8 flex items-center justify-center text-xs font-bold text-gray-500 bg-gray-700/50 rounded">${(v.vehicleName || '?')[0]}</span>`}
            <span class="text-sm text-gray-200 flex-1 truncate">${v.vehicleName}</span>
            <span class="text-sm font-bold text-accent shrink-0">${formatNum(v.kills)}</span>
          </div>
          <div style="font-size:10px;margin-top:3px;padding-left:44px;display:flex;gap:18px"><div style="text-align:left"><div style="color:#6b7280">总伤害</div><div style="color:#d1d5db;font-size:11px">${formatNum(Math.round(v.damage||0))}</div></div><div style="text-align:left"><div style="color:#6b7280">摧毁载具</div><div style="color:#d1d5db;font-size:11px">${formatNum(v.destroyed)}</div></div><div style="text-align:left"><div style="color:#6b7280">路杀</div><div style="color:#d1d5db;font-size:11px">${formatNum(v.roadKills||0)}</div></div><div style="text-align:left"><div style="color:#6b7280">时长</div><div style="color:#d1d5db;font-size:11px">${(v.timeIn||v.secondsPlayed) ? formatSeconds(v.timeIn||v.secondsPlayed) : '—'}</div></div></div>
        </div>`).join('');
    }

    // ── 击杀类型雷达图 ──
    function renderKillTypeChart(stats, platform) {
      const dk = stats.dividedKills || {};
      const killTypes = [
        { name: '步兵击杀', value: dk.human || 0 },
        { name: '载具击杀', value: dk.vehicle || 0 },
        { name: '远距离',   value: dk.longDistance || 0 },
        { name: '手雷',     value: dk.grenades || 0 },
        { name: '近战',     value: dk.melee || 0 },
        { name: '路杀',     value: dk.roadkills || 0 },
        { name: '降落伞',   value: dk.parachute || 0 },
        { name: '多杀',     value: dk.multiKills || 0 },
        { name: '乘客击杀', value: dk.passenger || 0 },
      ].filter(x => x.value > 0);
      if (killTypes.length) renderRadarChart(document.getElementById(`killTypeChart-${platform}`), killTypes);
    }

    // ── 兵种数据 ──
    function renderClassSection(allData, platform) {
      const classes = (allData?.classes || []).filter(c => c.className !== 'All' && c.kills > 0);
      if (classes.length) {
        document.getElementById(`classSection-${platform}`).style.display = '';
        document.getElementById(`classCards-${platform}`).innerHTML = classes.map(c => {
          const spmVal = c.score && c.secondsPlayed ? (c.score / (c.secondsPlayed / 60)).toFixed(0) : '—';
          return `
            <div class="bg-dark rounded-xl p-4">
              <div class="flex items-center gap-3 mb-3">
                ${c.image ? `<img loading="lazy" src="${c.image}" class="w-8 h-8 opacity-80" alt="${c.className}">` : ''}
                <div>
                  <p class="text-sm font-semibold text-white">${CLASS_CN[c.className] || c.className}</p>
                  <p class="text-xs text-gray-500">${formatSeconds(c.secondsPlayed)}</p>
                </div>
              </div>
              <div class="grid grid-cols-2 gap-x-2 sm:gap-x-4 gap-y-2 text-sm">
                <div><p class="font-bold" style="color:${kdColor(c.killDeath)}">${formatDecimal(c.killDeath)}</p><p class="text-xs text-gray-500">K/D</p></div>
                <div><p class="font-bold text-white">${formatDecimal(c.kpm)}</p><p class="text-xs text-gray-500">KPM</p></div>
                <div><p class="font-bold text-white">${formatNum(c.kills)}</p><p class="text-xs text-gray-500">击杀</p></div>
                <div><p class="font-bold text-white">${formatNum(c.assists)}</p><p class="text-xs text-gray-500">助攻</p></div>
                <div><p class="font-bold text-white">${formatNum(c.spawns)}</p><p class="text-xs text-gray-500">出生次数</p></div>
                <div><p class="font-bold text-white">${spmVal}</p><p class="text-xs text-gray-500">SPM</p></div>
              </div>
            </div>`;
        }).join('');
        renderRadarChart(document.getElementById(`classChart-${platform}`), classes.map(c => ({ name: CLASS_CN[c.className] || c.className, value: c.kills })));
      } else {
        document.getElementById(`classChart-${platform}`).innerHTML = '<p class="text-gray-600 text-sm text-center pt-10">暂无兵种数据</p>';
      }
    }

    // ── 个人记录 ──
    function renderPersonalRecords(stats, platform) {
      const recordDefs = [
        { label: '最远爆头距离', value: stats.longestHeadShot != null ? formatNum(Math.round(stats.longestHeadShot)) + ' m' : null },
        { label: '最高连杀',     value: stats.highestKillStreak != null ? formatNum(stats.highestKillStreak) : null },
        { label: '夺取狗牌',     value: stats.dogtagsTaken != null ? formatNum(stats.dogtagsTaken) : null },
        { label: '最高得分/局',  value: stats.highestScore != null ? formatNum(stats.highestScore) : null },
        { label: '最高K/D局',    value: stats.bestGame?.kills != null ? formatNum(stats.bestGame.kills) + '杀' : null },
        { label: '最高伤害/局',  value: stats.highestDamageDealt != null ? formatNum(Math.round(stats.highestDamageDealt)) : null },
        { label: '最远击杀',     value: stats.longestKillStreak != null ? formatNum(Math.round(stats.longestKillStreak)) + ' m' : null },
        { label: '连杀纪录',     value: stats.highestKillSteakGame != null ? formatNum(stats.highestKillSteakGame) : null },
      ].filter(r => r.value != null);
      if (recordDefs.length) {
        document.getElementById(`recordSection-${platform}`).style.display = '';
        document.getElementById(`recordCards-${platform}`).innerHTML = recordDefs.map(r => `
          <div class="bg-dark rounded-xl p-4">
            <p class="text-lg font-bold text-accent">${r.value}</p>
            <p class="text-xs text-gray-500 mt-1">${r.label}</p>
          </div>`).join('');
      }
    }

    // ── 赛季历史 ──
    function renderSeasonHistory(allData, platform) {
      const seasons = Array.isArray(allData?.seasons) ? allData.seasons : [];
      if (seasons.length <= 1) return;
      // 每个赛季汇总所有模式的数据
      const seasonSummary = seasons.map(s => {
        const all = s.modes || [];
        const kills   = all.reduce((a, m) => a + (m.kills || 0), 0);
        const deaths  = all.reduce((a, m) => a + (m.deaths || 0), 0);
        const wins    = all.reduce((a, m) => a + (m.wins || 0), 0);
        const matches = all.reduce((a, m) => a + (m.matches || 0), 0);
        return {
          season: s.season,
          kd:     deaths ? (kills / deaths) : 0,
          wins,
          matches,
          winRate: matches ? (wins / matches * 100) : 0,
          kills,
        };
      });
      document.getElementById(`seasonSection-${platform}`).style.display = '';
      requestAnimationFrame(() => {
        const chart = echarts.init(document.getElementById(`seasonChart-${platform}`), 'dark');
        chart.setOption({
          backgroundColor: 'transparent',
          legend: { data: ['K/D', '胜率(%)'], textStyle: { color: '#9ca3af' }, top: 0 },
          grid: { left: 45, right: 55, top: 40, bottom: 40 },
          xAxis: { type: 'category', data: seasonSummary.map(s => s.season), axisLabel: { color: '#6b7280', fontSize: 10 }, splitLine: { show: false } },
          yAxis: [
            { type: 'value', name: 'K/D', nameTextStyle: { color: '#6b7280', fontSize: 10 }, axisLabel: { color: '#6b7280', fontSize: 10 }, splitLine: { lineStyle: { color: '#374151' } } },
            { type: 'value', name: '胜率%', nameTextStyle: { color: '#6b7280', fontSize: 10 }, position: 'right', axisLabel: { color: '#6b7280', fontSize: 10, formatter: '{value}%' }, splitLine: { show: false } },
          ],
          tooltip: {
            trigger: 'axis', backgroundColor: '#242933', borderColor: '#374151', textStyle: { color: '#f3f4f6' },
            formatter: params => {
              const s = seasonSummary[params[0].dataIndex];
              return `${s.season}<br/>${params.map(p => `${p.marker}${p.seriesName}: <b>${p.value}</b>${p.seriesName === '胜率(%)' ? '%' : ''}`).join('<br/>')}<br/>场次: ${s.matches}  击杀: ${s.kills}`;
            },
          },
          series: [
            { name: 'K/D',    yAxisIndex: 0, type: 'line', smooth: true, data: seasonSummary.map(s => s.kd.toFixed(2)),       lineStyle: { color: '#ff4655' }, itemStyle: { color: '#ff4655' }, symbol: 'circle', symbolSize: 6 },
            { name: '胜率(%)', yAxisIndex: 1, type: 'line', smooth: true, data: seasonSummary.map(s => s.winRate.toFixed(1)), lineStyle: { color: '#22c55e' }, itemStyle: { color: '#22c55e' }, symbol: 'circle', symbolSize: 6 },
          ],
        });
        window.addEventListener('resize', () => chart.resize());
      });
      // 赛季汇总卡片
      const seasonCards = document.createElement('div');
      seasonCards.className = 'grid grid-cols-2 sm:grid-cols-4 gap-3 mt-4';
      seasonCards.innerHTML = seasonSummary.map(s => `
        <div class="bg-dark rounded-xl p-4">
          <p class="text-xs text-gray-500 mb-1">${s.season}</p>
          <div class="grid grid-cols-2 gap-x-3 gap-y-1 text-sm">
            <div><p class="font-bold text-white">${s.kills}</p><p class="text-xs text-gray-500">击杀</p></div>
            <div><p class="font-bold text-white">${formatDecimal(s.kd)}</p><p class="text-xs text-gray-500">K/D</p></div>
            <div><p class="font-bold text-white">${s.wins}</p><p class="text-xs text-gray-500">胜场</p></div>
            <div><p class="font-bold text-white">${s.winRate.toFixed(1)}%</p><p class="text-xs text-gray-500">胜率</p></div>
          </div>
        </div>
      `).join('');
      document.getElementById(`seasonChart-${platform}`).parentElement.appendChild(seasonCards);
    }

    // ── 游戏模式胜率（桌面热力条 + 移动端列表）──
    function renderGameModes(allData, platform) {
      const gameModes = (allData?.gameModes || allData?.gamemodes || [])
        .filter(m => m.matches > 0 && m.gamemodeName !== 'Official')
        .sort((a, b) => (parseFloat(b.winPercent) || 0) - (parseFloat(a.winPercent) || 0));
      if (!gameModes.length) return;
      document.getElementById(`winRateSection-${platform}`).style.display = '';
      document.getElementById(`modeSection-${platform}`).style.display = '';
      // 桌面端：热力条
      document.getElementById(`modeChart-${platform}`).innerHTML = gameModes.map((m, i) => {
        const pct = Math.max(0, parseFloat(m.winPercent) || 0);
        const color = pct >= 50 ? '#22c55e' : pct >= 40 ? '#facc15' : '#f87171';
        const img = m.image ? `<img loading="lazy" src="${m.image}" class="w-10 h-10 object-contain shrink-0" alt="">` : `<span class="w-8 h-8 flex items-center justify-center text-xs font-bold text-gray-500 bg-gray-700/50 rounded shrink-0">M</span>`;
        const sub = `总场次 ${m.matches} · 胜场 ${formatNum(m.wins)} · 负场 ${formatNum(m.losses)} · 时长 ${formatSeconds(m.secondsPlayed)}`;
        return `<div class="flex items-start gap-3 bg-dark rounded-lg px-3 py-2 mb-2"><span class="text-xs text-gray-500 w-5 text-right shrink-0 pt-1">${i+1}</span><div class="w-12 h-12 rounded bg-gray-700/30 flex items-center justify-center shrink-0 overflow-hidden">${img}</div><div class="flex-1 min-w-0"><div class="flex items-center gap-2"><span class="text-xs text-gray-300 w-24 truncate shrink-0">${getModeName(m.gamemodeName)}</span><div class="flex-1 bg-gray-700/50 rounded-full h-3 overflow-hidden"><div class="h-full rounded-full" style="width:${pct}%;background:${color}"></div></div><span class="text-xs font-bold w-12 text-right shrink-0" style="color:${color}">${pct.toFixed(1)}%</span></div><div style="font-size:10px;margin-top:4px;display:flex;gap:18px"><div style="color:#6b7280">总场次<div style="color:#d1d5db;font-size:11px">${m.matches}</div></div><div style="color:#6b7280">胜场<div style="color:#d1d5db;font-size:11px">${formatNum(m.wins)}</div></div><div style="color:#6b7280">负场<div style="color:#d1d5db;font-size:11px">${formatNum(m.losses)}</div></div><div style="color:#6b7280">时长<div style="color:#d1d5db;font-size:11px">${formatSeconds(m.secondsPlayed)}</div></div></div></div></div>`;
      }).join('');
      // 移动端：列表
      document.getElementById(`modeList-${platform}`).innerHTML = gameModes.map(m => {
        const pct = parseFloat(m.winPercent) || 0;
        const color = pct >= 50 ? '#22c55e' : pct >= 40 ? '#facc15' : '#f87171';
        const img = m.image ? `<img loading="lazy" src="${m.image}" class="w-8 h-8 object-contain" alt="">` : `<span class="w-8 h-8 flex items-center justify-center text-xs font-bold text-gray-500 bg-gray-700/50 rounded">M</span>`;
        return `<div class="bg-dark rounded-lg px-3 py-2">
          <div class="flex items-center gap-3">
            ${img}
            <span class="text-sm text-gray-200 flex-1 truncate">${getModeName(m.gamemodeName)}</span>
            <span class="text-sm font-bold shrink-0" style="color:${color}">${pct.toFixed(1)}%</span>
          </div>
          <div style="font-size:10px;margin-top:3px;padding-left:44px;display:flex;gap:18px"><div style="text-align:left"><div style="color:#6b7280">总场次</div><div style="color:#d1d5db;font-size:11px">${m.matches}</div></div><div style="text-align:left"><div style="color:#6b7280">胜场</div><div style="color:#d1d5db;font-size:11px">${formatNum(m.wins)}</div></div><div style="text-align:left"><div style="color:#6b7280">负场</div><div style="color:#d1d5db;font-size:11px">${formatNum(m.losses)}</div></div><div style="text-align:left"><div style="color:#6b7280">时长</div><div style="color:#d1d5db;font-size:11px">${formatSeconds(m.secondsPlayed)}</div></div></div>
        </div>`;
      }).join('');
    }

    // ── 地图胜率（桌面热力条 + 移动端列表）──
    function renderMaps(allData, platform) {
      const maps = (allData?.maps || []).filter(m => m.mapName !== 'All' && m.matches > 0)
        .sort((a, b) => (parseFloat(b.winPercent) || 0) - (parseFloat(a.winPercent) || 0)).slice(0, 15);
      if (!maps.length) return;
      document.getElementById(`winRateSection-${platform}`).style.display = '';
      document.getElementById(`mapSection-${platform}`).style.display = '';
      // 桌面端：热力条
      document.getElementById(`mapChart-${platform}`).innerHTML = maps.map((m, i) => {
        const pct = Math.max(0, parseFloat(m.winPercent) || 0);
        const color = pct >= 50 ? '#22c55e' : pct >= 40 ? '#facc15' : '#f87171';
        const img = m.image ? `<img loading="lazy" src="${m.image}" class="w-10 h-10 object-cover rounded shrink-0" alt="">` : `<span class="w-8 h-8 flex items-center justify-center text-xs font-bold text-gray-500 bg-gray-700/50 rounded shrink-0">${(MAP_CN[m.mapName]||m.mapName||'?')[0]}</span>`;
        const sub = `总场次 ${m.matches} · 胜场 ${formatNum(m.wins)} · 负场 ${formatNum(m.losses)} · 时长 ${formatSeconds(m.secondsPlayed)}`;
        return `<div class="flex items-start gap-3 bg-dark rounded-lg px-3 py-2 mb-2"><span class="text-xs text-gray-500 w-5 text-right shrink-0 pt-1">${i+1}</span><div class="w-12 h-12 rounded bg-gray-700/30 flex items-center justify-center shrink-0 overflow-hidden">${img}</div><div class="flex-1 min-w-0"><div class="flex items-center gap-2"><span class="text-xs text-gray-300 w-24 truncate shrink-0">${MAP_CN[m.mapName] || m.mapName}</span><div class="flex-1 bg-gray-700/50 rounded-full h-3 overflow-hidden"><div class="h-full rounded-full" style="width:${pct}%;background:${color}"></div></div><span class="text-xs font-bold w-12 text-right shrink-0" style="color:${color}">${pct.toFixed(1)}%</span></div><div style="font-size:10px;margin-top:4px;display:flex;gap:18px"><div style="color:#6b7280">总场次<div style="color:#d1d5db;font-size:11px">${m.matches}</div></div><div style="color:#6b7280">胜场<div style="color:#d1d5db;font-size:11px">${formatNum(m.wins)}</div></div><div style="color:#6b7280">负场<div style="color:#d1d5db;font-size:11px">${formatNum(m.losses)}</div></div><div style="color:#6b7280">时长<div style="color:#d1d5db;font-size:11px">${formatSeconds(m.secondsPlayed)}</div></div></div></div></div>`;
      }).join('');
      // 移动端：列表
      document.getElementById(`mapList-${platform}`).innerHTML = maps.map(m => {
        const pct2 = parseFloat(m.winPercent) || 0;
        const color2 = pct2 >= 50 ? '#22c55e' : pct2 >= 40 ? '#facc15' : '#f87171';
        const img = m.image ? `<img loading="lazy" src="${m.image}" class="w-8 h-8 object-cover rounded" alt="">` : `<span class="w-8 h-8 flex items-center justify-center text-xs font-bold text-gray-500 bg-gray-700/50 rounded">${(MAP_CN[m.mapName] || m.mapName || '?')[0]}</span>`;
        return `<div class="bg-dark rounded-lg px-3 py-2">
          <div class="flex items-center gap-3">
            ${img}
            <span class="text-sm text-gray-200 flex-1 truncate">${MAP_CN[m.mapName] || m.mapName}</span>
            <span class="text-sm font-bold shrink-0" style="color:${color2}">${pct2.toFixed(1)}%</span>
          </div>
          <div style="font-size:10px;margin-top:3px;padding-left:44px;display:flex;gap:18px"><div style="text-align:left"><div style="color:#6b7280">总场次</div><div style="color:#d1d5db;font-size:11px">${m.matches}</div></div><div style="text-align:left"><div style="color:#6b7280">胜场</div><div style="color:#d1d5db;font-size:11px">${formatNum(m.wins)}</div></div><div style="text-align:left"><div style="color:#6b7280">负场</div><div style="color:#d1d5db;font-size:11px">${formatNum(m.losses)}</div></div><div style="text-align:left"><div style="color:#6b7280">时长</div><div style="color:#d1d5db;font-size:11px">${formatSeconds(m.secondsPlayed)}</div></div></div>
        </div>`;
      }).join('');
    }

    // ── 支援与目标数据 ──
    function renderSupportSection(stats, platform) {
      function statCell(label, value) {
        return `<div class="bg-dark rounded-xl p-3">
          <p class="text-base font-bold text-white">${value}</p>
          <p class="text-xs text-gray-500 mt-0.5">${label}</p>
        </div>`;
      }
      const obj = stats.objective || {};
      const supportItems = [
        ['救援击杀', formatNum(stats.saviorKills)],
        ['助攻',     formatNum(stats.killAssists)],
        ['侦察',     formatNum(stats.enemiesSpotted)],
        ['复活',     formatNum(stats.revives)],
        ['队友复活', formatNum(stats.squadmateRevive)],
        ['治疗',     formatNum(stats.heals)],
        ['补给',     formatNum(stats.resupplies)],
        ['修理',     formatNum(stats.repairs)],
        ['摧毁载具', formatNum(stats.vehiclesDestroyed)],
        ['摧毁配备', formatNum(stats.gadgetsDestroyed ?? stats.gadgetsDestoyed)],
      ].filter(([, v]) => v !== '-' && v !== '0' && v !== formatNum(0));
      const objectiveItems = [
        ['占点数',   formatNum(obj.captured)],
        ['中立化',   formatNum(obj.neutralized)],
        ['防守次数', formatNum(obj.defended ?? obj.time?.defended)],
        ['安弹次数', formatNum(obj.armed)],
        ['拆弹次数', formatNum(obj.defused)],
        ['摧毁目标', formatNum(obj.destroyed)],
        ['目标时间', formatSeconds(obj.time?.total)],
      ].filter(([, v]) => v !== '-' && v !== '0' && v !== formatNum(0));
      if (supportItems.length || objectiveItems.length) {
        document.getElementById(`supportSection-${platform}`).style.display = '';
        document.getElementById(`supportStats-${platform}`).innerHTML    = supportItems.map(([l, v]) => statCell(l, v)).join('');
        document.getElementById(`objectiveStats-${platform}`).innerHTML  = objectiveItems.map(([l, v]) => statCell(l, v)).join('') || '<p class="text-gray-600 text-sm col-span-2 pt-4">暂无目标数据</p>';
      }
    }

    // ─── 主加载逻辑 ──────────────────────────────────────────
    async function load() {
      if (!name) {
        document.getElementById('loadingState').classList.add('hidden');
        document.getElementById('errorState').classList.remove('hidden');
        document.getElementById('errorTitle').textContent = '请输入玩家用户名';
        document.getElementById('errorMsg').textContent   = '';
        document.getElementById('errorTips').style.display = 'none';
        return;
      }

      const BASE      = 'https://api.gametools.network';

      // 获取平台分类下的细分平台（默认 Xbox）
      const urlParams = new URLSearchParams(window.location.search);
      const platformCategory = (() => {
        const raw = urlParams.get('platform') || 'Xbox';
        // 兼容旧搜索：将小写子平台（如 xbox/xboxone）映射到分类（Xbox）
        const lower = raw.toLowerCase();
        if (lower === 'xbox' || lower === 'xboxone' || lower === 'xboxseries') return 'Xbox';
        if (lower === 'psn' || lower === 'ps4' || lower === 'ps5' || lower === 'playstation') return 'PlayStation';
        if (lower === 'pc' || lower === 'steam' || lower === 'ea' || lower === 'epic') return 'PC';
        return raw;
      })();
      const gameCatPlatforms = GAME_CATEGORY_PLATFORMS[game] || { 'PC': ['steam'] };
      let platforms = gameCatPlatforms[platformCategory] || ['steam'];

      // 智能检测：找出该玩家实际活跃的子平台，配合通用平台作为兜底
      let detectedPlatforms = null;
      if (platforms.length > 2) {
        try {
          const playerResults = await searchPlayer(game, name, platforms[0]);
          if (playerResults?.results?.length) {
            const activePlatforms = new Set();
            playerResults.results.forEach(r => {
              if (r.platform && platforms.includes(r.platform)) {
                activePlatforms.add(r.platform);
              }
            });
            if (activePlatforms.size > 0) detectedPlatforms = [...activePlatforms];
          }
        } catch {}
      }
      // 用检测到的平台优先，但保留全量作为兜底（兼容 API 只认通用平台名的情况）
      if (detectedPlatforms) {
        platforms = [...new Set([...detectedPlatforms, ...platforms])];
      }

      // 并发查询（只查检测到的平台）
      const settled = await Promise.allSettled(
        platforms.map(async p => {
          const [stats, allData] = await Promise.all([
            getStats(game, name, p),
            fetch(`${BASE}/${game}/all/?name=${encodeURIComponent(name)}&platform=${p}`, { signal: AbortSignal.timeout?.(15000) })
              .then(r => r.json()).catch(() => null),
          ]);
          // 保存 API 数据到缓存
          if (allData) saveApiCache(game, p, name, allData);
          return { platform: p, stats, allData };
        })
      );

      // 过滤成功结果，按 userId 去重
      const seen = new Set();
      const results = settled
        .filter(r => r.status === 'fulfilled')
        .map(r => r.value)
        .filter(({ stats }) => {
          const uid = stats.userId ?? stats.id;
          if (uid == null) return true;
          if (seen.has(uid)) return false;
          seen.add(uid);
          return true;
        });

      if (!results.length) {
        // 取第一个失败原因作为错误信息
        const firstErr = settled.find(r => r.status === 'rejected')?.reason;
        let errMsg = firstErr?.message || 'NOTFOUND';
        if (errMsg === 'TIMEOUT') errMsg = '请求超时，请检查网络后重试';
        else if (errMsg === 'NETWORK') errMsg = '网络连接失败，请检查网络';
        else if (errMsg === 'NOTFOUND' || errMsg === 'NO_STATS') errMsg = '未找到该玩家，请检查用户名和平台';
        showError(errMsg);
        return;
      }

      // 保存搜索记录（用第一个结果的平台）
      saveSnapshot(game, results[0].platform, name, results[0].stats);
      saveRecentSearch(game, results[0].platform, name);

      // 填充玩家头部（用第一个结果）
      const first = results[0];

      // 缓存分享数据
      const stats = first.stats;
      const allClass = first.allData?.classes?.find(c => c.id === 'kit') || first.allData?.classes?.[0];
      const humanKills = stats.dividedKills?.human || stats.kills || 0;
      const spmVal = (allClass?.score && allClass?.secondsPlayed)
        ? (allClass.score / (allClass.secondsPlayed / 60)).toFixed(2)
        : (stats.scorePerMinute != null ? parseFloat(stats.scorePerMinute).toFixed(2) : null);
      const mp = stats.matchesPlayed ?? ((stats.wins != null && stats.loses != null) ? stats.wins + stats.loses : null);
      const hp = stats.headshots;
      const hkr = humanKills / (stats.deaths || 1);
      const hkpm = mp ? (humanKills / mp).toFixed(2) : null;
      const dpm = mp ? ((allClass?.deaths ?? stats.deaths ?? 0) / mp).toFixed(2) : null;
      window.__shareData = {
        name: stats.userName || name,
        game: GAME_LABELS[game] || game,
        time: formatSeconds(stats.secondsPlayed),
        kd: formatDecimal(hkr),
        kdColor: kdColor(hkr),
        wr: formatPct(stats.winPercent),
        wrColor: winColor(parseFloat(stats.winPercent)),
        platform: first.platform,
        url: location.href,
        avatar: stats.avatar,
        kills: formatNum(humanKills),
        deaths: formatNum(stats.deaths),
        wins: formatNum(stats.wins),
        matches: formatNum(mp),
        spm: spmVal,
        headshots: formatPct(hp),
        accuracy: formatPct(stats.accuracy),
        kpm: formatDecimal(stats.killsPerMinute),
        killsPerMatch: hkpm,
        deathsPerMatch: dpm,
        headShots: formatNum(stats.headShots),
        assists: formatNum(allClass?.assists ?? stats.killAssists),
        revives: formatNum(stats.revives),
        isBanned: false,
      };
      // 缓存板块数据供分享文本使用
      window.__shareOps = {
        weapons: (first.allData?.weapons || []).filter(w => w.kills > 0).sort((a, b) => b.kills - a.kills).slice(0, 5).map(w => ({ name: w.weaponName, kills: formatNum(w.kills) })),
        vehicles: (first.allData?.vehicles || []).filter(v => v.kills > 0).sort((a, b) => b.kills - a.kills).slice(0, 5).map(v => ({ name: v.vehicleName, kills: formatNum(v.kills) })),
        maps: (first.allData?.maps || []).filter(m => m.mapName !== 'All' && m.matches > 0).sort((a, b) => (parseFloat(b.winPercent) || 0) - (parseFloat(a.winPercent) || 0)).slice(0, 5).map(m => ({ name: MAP_CN[m.mapName] || m.mapName, wr: parseFloat(m.winPercent).toFixed(1) })),
        classes: (first.allData?.classes || []).filter(c => c.className !== 'All' && c.kills > 0).sort((a, b) => b.kills - a.kills).slice(0, 4).map(c => ({ name: CLASS_CN[c.className] || c.className, kills: formatNum(c.kills) })),
      };

      // ── 封禁检测 ──
      (async () => {
        try {
          const [banData, eacData] = await Promise.all([
            checkBan(name).catch(() => null),
            checkEacBan(name).catch(() => null),
          ]);
          const el = document.getElementById('banStatus');
          const banned = banData?.isBanned || eacData?.isBanned;
          if (el) {
            if (banned) {
              el.innerHTML = '<span class="text-xs font-semibold px-2 py-0.5 rounded-full bg-red-900/50 text-red-400 h-6 flex items-center">已封禁</span>';
            } else {
              el.innerHTML = '<span class="text-xs font-semibold px-2 py-0.5 rounded-full bg-green-900/50 text-green-400 h-6 flex items-center">绿玩</span>';
            }
          }
          if (window.__shareData) window.__shareData.isBanned = banned;
        } catch {}
      })();

      // ── BF6 赛季分离数据 ──
      if (game === 'bf6') {
        (async () => {
          try {
            const data = await getStatsSeparated('bf6', name, results[0].platform).catch(() => null);
            if (!data) return;
            const seasons = data.seasons || data.gamemodeSeperation || [];
            if (!seasons.length) return;
            const sec = document.getElementById('seasonStatsSection');
            const ct = document.getElementById('seasonStatsContent');
            if (!sec || !ct) return;
            sec.style.display = '';
            ct.innerHTML = '<div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="border-b border-gray-700"><th class="text-left py-2 pr-4 text-gray-500 font-medium text-xs">赛季</th><th class="text-left py-2 pr-4 text-gray-500 font-medium text-xs">K/D</th><th class="text-left py-2 pr-4 text-gray-500 font-medium text-xs">胜率</th><th class="text-left py-2 pr-4 text-gray-500 font-medium text-xs">KPM</th><th class="text-left py-2 pr-4 text-gray-500 font-medium text-xs">击杀</th><th class="text-left py-2 pr-4 text-gray-500 font-medium text-xs">场次</th></tr></thead><tbody>' +
              seasons.map(s => {
                const kd = s.killDeath || s.kd;
                const wp = s.winPercent || (s.wins / (s.wins + s.loses) * 100);
                return `<tr class="border-b border-gray-700/40 hover:bg-gray-800/30"><td class="py-2 pr-4 text-white font-medium">${s.season || s.gamemode || '—'}</td><td class="py-2 pr-4 text-gray-300">${formatDecimal(kd)}</td><td class="py-2 pr-4 text-gray-300">${formatPct(wp)}</td><td class="py-2 pr-4 text-gray-300">${formatDecimal(s.killsPerMinute || s.kpm)}</td><td class="py-2 pr-4 text-gray-300">${formatNum(s.kills)}</td><td class="py-2 pr-4 text-gray-300">${formatNum(s.matchesPlayed || s.matches)}</td></tr>`;
              }).join('') + '</tbody></table></div>';
          } catch {}
        })();
      }

      // ── BF2042 玩家名片 ──
      if (game === 'bf2042') {
        (async () => {
          try {
            const inv = await getInventory('bf2042', name, results[0].platform).catch(() => null);
            if (!inv) return;
            const sec = document.getElementById('inventorySection');
            const ct = document.getElementById('inventoryContent');
            if (!sec || !ct) return;
            sec.style.display = '';
            const badges = inv.badges || inv.emblem || [];
            if (badges.length) {
              ct.innerHTML = '<div class="flex flex-wrap gap-2">' +
                badges.slice(0, 12).map(b => `<span class="bg-dark rounded-lg px-3 py-1.5 text-xs text-gray-300 border border-gray-700">${b.name || b.id || '徽章'}</span>`).join('') +
                '</div>';
            } else {
              ct.innerHTML = '<p class="text-gray-500 text-xs">暂无名片数据</p>';
            }
          } catch {}
        })();
      }

      const tabPanel  = document.getElementById('tabPanel');

      // 直接渲染第一个结果（已移除平台切换功能）
      renderPlatformContent(tabPanel, first);

      document.getElementById('loadingState').classList.add('hidden');
      document.getElementById('content').classList.remove('hidden');
    }

    function showError(msg) {
      document.getElementById('loadingState').classList.add('hidden');
      document.getElementById('errorState').classList.remove('hidden');
      const isNotFound = /not found|player|NOTFOUND/i.test(msg);
      const isNoStats  = msg === 'NO_STATS';
      const isTimeout  = msg === 'TIMEOUT';
      const isNetwork  = msg === 'NETWORK';

      document.getElementById('errorTitle').textContent =
        isNoStats ? '暂无战绩数据' : isNotFound ? '未找到玩家' :
        isTimeout ? '请求超时'     : isNetwork  ? '网络连接失败' : '查询失败';

      document.getElementById('errorMsg').textContent =
        isNoStats  ? `找到了玩家 "${name}"，但该账号在 ${GAME_LABELS[game] || game} 中没有战绩记录` :
        isNotFound ? `在 ${GAME_LABELS[game] || game} 的所有平台中均未找到玩家 "${name}"` :
        isTimeout  ? '数据服务响应超时，请稍后重试' :
        isNetwork  ? '无法连接到数据服务，请检查网络后重试' : msg;

      document.getElementById('errorTips').innerHTML =
        isNoStats ? `
          <p class="text-gray-300 font-medium mb-3">可能的原因：</p>
          <p>· 该账号未购买或未玩过此游戏</p>
          <p>· 游戏数据尚未同步到统计服务</p>` :
        (isTimeout || isNetwork) ? `
          <p class="text-gray-300 font-medium mb-3">建议操作：</p>
          <p>· 检查网络连接是否正常</p>
          <p>· 刷新页面重新查询</p>
          <p>· 尝试切换网络环境（如 WiFi / 移动数据）</p>
          <p>· 数据服务可能暂时不稳定，稍后再试</p>` : `
          <p class="text-gray-300 font-medium mb-3">可能的原因：</p>
          <p>· 用户名拼写错误，注意大小写</p>
          <p>· 该玩家从未在此游戏中有过记录</p>
          <p>· 游戏服务器暂时不可用，稍后再试</p>`;
      document.getElementById('errorTips').style.display = '';
    }

    load().catch(err => {
      const loadingState = document.getElementById('loadingState');
      const errorState = document.getElementById('errorState');
      if (loadingState) loadingState.classList.add('hidden');
      if (errorState) {
        errorState.classList.remove('hidden');
        document.getElementById('errorTitle').textContent = '查询失败';
        document.getElementById('errorMsg').textContent = err?.message || '未知错误，请稍后重试';
        const tips = document.getElementById('errorTips');
        if (tips) tips.style.display = 'none';
      }
    });

    // ─── Tab切换功能 ───
    window._toggleDetailTabs = (platform) => {
      const tabs = document.getElementById('detailTabs-' + platform);
      const btn = document.getElementById('showMoreBtn-' + platform);
      if (!tabs) return;
      if (tabs.style.display === 'none') {
        tabs.style.display = '';
        if (btn) btn.textContent = '收起更多 ▲';
      } else {
        tabs.style.display = 'none';
        if (btn) btn.textContent = '查看更多 ▼';
      }
    };

    window._switchTab = (tab, platform) => {
      const nav = document.getElementById('tabNav-' + platform);
      if (nav) {
        nav.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        const btn = nav.querySelector('[data-tab="' + tab + '"]');
        if (btn) btn.classList.add('active');
      }
      const panels = document.querySelectorAll('#detailTabs-' + platform + ' .tab-panel');
      panels.forEach(p => p.classList.add('hidden'));
      const panel = document.getElementById('tab-' + tab + '-' + platform);
      if (panel) panel.classList.remove('hidden');
      // 切换tab后resize echarts实例
      setTimeout(() => {
        panel.querySelectorAll('[_echarts_instance_]').forEach(el => {
          const inst = echarts.getInstanceByDom(el);
          if (inst) inst.resize();
        });
      }, 50);
    };

    // ─── 分享功能（放在最后避免初始化顺序问题） ───

    window.doShareLink = async () => {
      const checks = document.querySelectorAll('#shareSections input[type=checkbox]:checked');
      const sections = [...checks].map(c => c.value);
      const d = window.__shareData || {};
      const ops = window.__shareOps || {};

      let text = `🎮 ${d.name} 的 ${d.game} 战绩\n`;
      text += `━━━━━━━━━━━━━━\n`;
      text += `⚔️ KD: ${d.kd} · 🏆 胜率: ${d.wr} · ⏱ ${d.time}\n`;
      
      if (sections.includes('weapons') && ops.weapons?.length) {
        text += `━━━ 武器Top5 ━━━\n`;
        ops.weapons.slice(0, 3).forEach(w => { text += `  ${w.name}: ${w.kills}杀\n`; });
      }
      if (sections.includes('vehicles') && ops.vehicles?.length) {
        text += `━━━ 载具Top5 ━━━\n`;
        ops.vehicles.slice(0, 3).forEach(v => { text += `  ${v.name}: ${v.kills}杀\n`; });
      }
      if (sections.includes('maps') && ops.maps?.length) {
        text += `━━━ 地图胜率 ━━━\n`;
        ops.maps.slice(0, 3).forEach(m => { text += `  ${m.name}: ${m.wr}%\n`; });
      }
      if (sections.includes('classes') && ops.classes?.length) {
        text += `━━━ 兵种分布 ━━━\n`;
        ops.classes.forEach(c => { text += `  ${c.name}: ${c.kills}杀\n`; });
      }
      text += `\n📊 查看完整数据 → ${d.url || location.href}`;

      try {
        if (navigator.share) {
          await navigator.share({ title: `${d.name} 的 ${d.game} 战绩`, text, url: d.url || location.href });
        } else {
          await navigator.clipboard.writeText(text);
          alert('已复制到剪贴板！');
        }
      } catch (err) {
        if (err?.name !== 'AbortError') {
          try {
            await navigator.clipboard.writeText(text);
            alert('已复制到剪贴板！');
          } catch {}
        }
      }
      window.closeShareModal();
    };

    // 海报生成中状态
    window.__posterLoading = false;

    window.doSharePoster = async () => {
      if (window.__posterLoading) return;
      window.__posterLoading = true;
      try {
        const d = window.__shareData || {};
        const W = 840, P = 48, BG = '#12151c', CARD = '#1a1e26';

        const stats = [
          ['每分钟得分', d.spm], ['爆头率', d.headshots], ['命中率', d.accuracy],
          ['KPM', d.kpm], ['场均击杀', d.killsPerMatch], ['场均死亡', d.deathsPerMatch],
          ['爆头数', d.headShots], ['助攻数', d.assists], ['急救数', d.revives],
        ].filter(s => s[1] != null && s[1] !== '—');

        const rows = Math.ceil(stats.length / 3);
        const FOOTER_H = 196;
        const H = 16 + P + 80 + 72 + 56 + 32 + 200 + 32 + rows * 120 + 24 + 32 + FOOTER_H + P;

        const canvas = document.createElement('canvas');
        canvas.width = W; canvas.height = H;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = BG; ctx.fillRect(0, 0, W, H);

        // 顶部渐变条
        const bar = ctx.createLinearGradient(0, 0, W, 0);
        bar.addColorStop(0, '#ff4655'); bar.addColorStop(1, '#fb923c');
        ctx.fillStyle = bar; ctx.fillRect(0, 0, W, 16);

        let y = 16 + P;

        // 标题
        const tg = ctx.createLinearGradient(P, 0, P + 360, 0);
        tg.addColorStop(0, '#ff4655'); tg.addColorStop(1, '#fb923c');
        ctx.fillStyle = tg;
        ctx.font = 'bold 44px system-ui, -apple-system, sans-serif';
        ctx.fillText('BF Tracker 战绩', P, y + 44);
        y += 80;
        ctx.strokeStyle = '#2a3040'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(P, y); ctx.lineTo(W - P, y); ctx.stroke();
        y += 40;

        // 玩家名 + 平台图标（圆形头像位）
        const pVal2 = d.platform ? d.platform.toLowerCase() : '';
        const iconSvg = pVal2.includes('steam') ? 'icons/steam.svg' : pVal2.includes('ea') ? 'icons/ea.svg' : pVal2.includes('epic') ? 'icons/epic.svg' : pVal2.includes('xbox') ? 'icons/xbox.svg' : (pVal2.includes('ps') || pVal2.includes('playstation')) ? 'icons/playstation.svg' : null;
        const iconSize = 44, avatarR = 36;
        if (iconSvg) {
          try {
            const icon = await new Promise((rs, rj) => { const im = new Image(); im.onload = () => rs(im); im.onerror = rj; im.src = iconSvg; });
            ctx.fillStyle = 'rgba(55,65,81,0.5)';
            ctx.beginPath(); ctx.arc(P + avatarR, y + 56, avatarR, 0, Math.PI * 2); ctx.fill();
            ctx.drawImage(icon, P + avatarR - iconSize / 2, y + 56 - iconSize / 2, iconSize, iconSize);
          } catch {}
        }
        ctx.fillStyle = '#f3f4f6';
        ctx.font = 'bold 48px system-ui, -apple-system, sans-serif';
        ctx.fillText(d.name || '—', P + 86, y + 60);
        y += 80;

        // 游戏名 · 时长 · 封禁
        ctx.font = '26px system-ui, -apple-system, sans-serif';
        ctx.fillStyle = '#9ca3af';
        const meta = `${d.game} · ${d.time}`;
        ctx.fillText(meta, P + 86, y + 28);
        const mw = ctx.measureText(meta).width;
        const ban = d.isBanned ? '已封禁' : '绿玩';
        ctx.font = 'bold 22px system-ui, -apple-system, sans-serif';
        const bw = ctx.measureText(ban).width + 28;
        const bx = P + 86 + mw + 24;
        ctx.fillStyle = d.isBanned ? 'rgba(239,68,68,0.18)' : 'rgba(74,222,128,0.18)';
        ctx.beginPath(); ctx.roundRect(bx, y + 4, bw, 36, 18); ctx.fill();
        ctx.fillStyle = d.isBanned ? '#f87171' : '#4ade80';
        ctx.fillText(ban, bx + 14, y + 30);
        y += 56;

        // KD + 胜率 双卡片
        const gap = 20, ch = 200, cw = (W - P * 2 - gap) / 2;
        const drawCard = (x, val, lb, color, s1, s1l, s2, s2l) => {
          ctx.fillStyle = CARD;
          ctx.beginPath(); ctx.roundRect(x, y, cw, ch, 20); ctx.fill();
          // 大数值
          ctx.fillStyle = color;
          ctx.font = 'bold 80px system-ui, -apple-system, sans-serif';
          ctx.fillText(val, x + 28, y + 80);
          // 标签
          ctx.fillStyle = '#6b7280';
          ctx.font = '22px system-ui, -apple-system, sans-serif';
          ctx.fillText(lb, x + 28, y + 112);
          // 子数据 - 每个占一列，值上标签下，避免重叠
          const subX1 = x + 28, subX2 = x + cw / 2 + 8;
          const subText = (sx, v, l) => {
            ctx.fillStyle = '#f3f4f6';
            ctx.font = 'bold 26px system-ui, -apple-system, sans-serif';
            ctx.fillText(v, sx, y + 160);
            ctx.fillStyle = '#6b7280';
            ctx.font = '20px system-ui, -apple-system, sans-serif';
            ctx.fillText(l, sx, y + 186);
          };
          subText(subX1, s1, s1l);
          subText(subX2, s2, s2l);
        };
        drawCard(P, d.kd, 'K/D', d.kdColor, d.kills, '击杀', d.deaths, '死亡');
        drawCard(P + cw + gap, d.wr, '胜率', d.wrColor, d.matches, '总场次', d.wins, '胜场');
        y += ch + 36;

        // 指标网格（3列）
        if (stats.length) {
          const COLS = 3, cg = 16, scw = (W - P * 2 - (COLS - 1) * cg) / COLS, sch = 108;
          for (let r = 0; r < rows; r++) {
            for (let c = 0; c < COLS; c++) {
              const i = r * COLS + c;
              if (i >= stats.length) break;
              const [lb, vl] = stats[i];
              const cx = P + c * (scw + cg), cy = y + r * (sch + 12);
              ctx.fillStyle = CARD;
              ctx.beginPath(); ctx.roundRect(cx, cy, scw, sch, 16); ctx.fill();
              ctx.fillStyle = '#f3f4f6';
              ctx.font = 'bold 34px system-ui, -apple-system, sans-serif';
              ctx.fillText(vl, cx + 20, cy + 52);
              ctx.fillStyle = '#6b7280';
              ctx.font = '20px system-ui, -apple-system, sans-serif';
              ctx.fillText(lb, cx + 20, cy + 86);
            }
          }
          y += rows * (sch + 12) + 28;
        }

        // 分隔线
        ctx.strokeStyle = '#2a3040'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(P, y); ctx.lineTo(W - P, y); ctx.stroke();
        y += 32;

        // 底部：左侧文字 + 右侧二维码，底部对齐
        const ftH = 150;
        const ftBase = y + ftH; // footer区域底部基线

        // 左侧文字
        const ftg = ctx.createLinearGradient(P, 0, P + 300, 0);
        ftg.addColorStop(0, '#ff4655'); ftg.addColorStop(1, '#fb923c');
        ctx.fillStyle = ftg;
        ctx.font = 'bold 36px system-ui, -apple-system, sans-serif';
        ctx.fillText('BF Tracker', P, ftBase - 70);
        ctx.fillStyle = '#9ca3af';
        ctx.font = '24px system-ui, -apple-system, sans-serif';
        ctx.fillText('战地系列战绩查询 · 全平台 · 免费开源', P, ftBase - 36);
        ctx.fillStyle = '#6b7280';
        ctx.font = '20px system-ui, -apple-system, sans-serif';
        ctx.fillText('mineonstudio.github.io/BFTracker', P, ftBase - 6);

        // 右侧二维码 - 底部与文字底部对齐
        const qr = 120;
        try {
          const qi = await new Promise((rs, rj) => {
            const im = new Image(); im.crossOrigin = 'anonymous';
            im.onload = () => rs(im); im.onerror = rj;
            im.src = 'https://api.qrserver.com/v1/create-qr-code/?size=' + qr + 'x' + qr + '&data=' + encodeURIComponent('https://mineonstudio.github.io/BFTracker/') + '&margin=2';
          });
          const qx = W - P - qr;
          const qy = ftBase - qr; // 底部对齐
          ctx.fillStyle = CARD;
          ctx.beginPath(); ctx.roundRect(qx - 6, qy - 6, qr + 12, qr + 12, 16); ctx.fill();
          ctx.drawImage(qi, qx, qy, qr, qr);
          ctx.fillStyle = '#9ca3af';
          ctx.font = '16px system-ui, -apple-system, sans-serif';
          ctx.fillText('扫码访问', qx + qr / 2 - 32, qy + qr + 22);
        } catch {}
        y += ftH + 10;

        // 预览
        window.__posterCanvas = canvas;
        document.getElementById('posterPreviewImg').src = canvas.toDataURL('image/png');
        canvas.toBlob(blob => {
          window.__posterFile = new File([blob], `bf-tracker-${d.name}.png`, { type: 'image/png' });
        }, 'image/png');
        document.getElementById('posterPreviewModal').classList.remove('hidden');
      } catch (err) {
        console.error('海报生成失败:', err);
        alert('海报生成失败: ' + (err?.message || err));
      } finally {
        window.__posterLoading = false;
      }
    };

    window.closePosterPreview = () => {
      document.getElementById('posterPreviewModal')?.classList.add('hidden');
      window.__posterFile = null;
      window.__posterCanvas = null;
    };

    window.downloadPoster = async () => {
      const c = window.__posterCanvas;
      if (!c) return;
      const d = window.__shareData || {};
      // 优先尝试原生分享
      if (window.__posterFile && navigator.canShare?.({ files: [window.__posterFile] })) {
        try {
          await navigator.share({ files: [window.__posterFile], title: `${d.name} 的 ${d.game} 战绩` });
          return;
        } catch (err) { if (err?.name === 'AbortError') return; }
      }
      // 降级下载
      try {
        const a = document.createElement('a');
        a.download = `bf-tracker-${d.name}.png`;
        a.href = c.toDataURL();
        a.click();
      } catch {
        alert('图片含跨域资源无法直接下载，请右键海报选择「存储图像」');
      }
    };

    window.sharePoster = async () => {
      const file = window.__posterFile;
      if (file) {
        try {
          if (navigator.canShare?.({ files: [file] })) {
            await navigator.share({ files: [file], title: `${window.__shareData?.name} 的 ${window.__shareData?.game} 战绩` });
            return;
          }
        } catch (err) {
          if (err?.name !== 'AbortError') {}
        }
      }
      window.downloadPoster();
    };
  </script>
  <script>
  document.addEventListener('keydown', e => {
    if (e.key === '/' && !['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) {
      e.preventDefault();
      const searchInput = document.querySelector('#nameInput');
      if (searchInput) searchInput.focus();
    }
  });</script>

  </div>

  <!-- 页脚 -->

      <div class="flex flex-col sm:flex-row items-center justify-between gap-4">

          <a href="index.html" class="text-lg font-bold gradient-text">BF Tracker</a>

          <a href="index.html" class="hover:text-gray-300 transition-colors">首页</a>

        </div>
